const DEFAULT_DUR={easy:60,interval:75,tempo:55,midweek_long:90,long:150,rest:0};

const calcBurned=(met,kg,mins)=>{
  if(!kg||!mins)return null;
  const kcal=Math.round(met*kg*(mins/60));
  return{kcal,kj:Math.round(kcal*4.184)};
};

const REPLENISH_RATE={easy:.60,interval:.75,tempo:.70,midweek_long:.72,long:.75,rest:.40};

const calcReplenish=(burned,kg,sid)=>{
  if(!burned||!kg)return null;
  const rate=REPLENISH_RATE[sid]||.65;
  const kcal=Math.max(Math.round(burned.kcal*rate),200);
  return{kcal,kj:Math.round(kcal*4.184),rate};
};

const calcMacros=(kg,sid,mins,carbLoad)=>{
  if(!kg)return null;
  if(carbLoad){
    const c=Math.round(10*kg),p=Math.round(.25*kg),f=Math.round(.08*kg);
    const kcal=c*4+p*4+f*9;
    return{carbs:c,protein:p,fat:f,kcal,kj:Math.round(kcal*4.184)};
  }
  const base={easy:{c:3.5,p:.28,f:.14},interval:{c:6.5,p:.40,f:.10},tempo:{c:5.5,p:.35,f:.11},midweek_long:{c:6.0,p:.36,f:.13},long:{c:8.5,p:.44,f:.11},rest:{c:2.8,p:.33,f:.17}};
  const m=base[sid]||base.easy;
  const df=mins?Math.max(.7,Math.min(1.5,mins/(DEFAULT_DUR[sid]||60))):1;
  const carbs=Math.round(m.c*kg*df),protein=Math.round(m.p*kg*df),fat=Math.round(m.f*kg*df);
  const kcal=carbs*4+protein*4+fat*9;
  return{carbs,protein,fat,kcal,kj:Math.round(kcal*4.184)};
};

// Scale ingredient quantities based on user weight vs 70kg reference
function scaleIngredients(ingredients, kg){
  const ratio=kg?Math.max(.6,Math.min(2.0,kg/70)):1;
  return ingredients.map(ing=>{
    const r=ing.scale?ratio:1;
    let displayLabel,kcal=0;
    if(ing.unit==="g"||ing.unit==="ml"){
      const qty=Math.round(ing.base*r/5)*5;
      kcal=Math.round((qty/100)*(ing.kcalPer100||0));
      displayLabel=`${qty}${ing.unit} ${ing.label}`;
    } else if(ing.unit===""||ing.unit==="slices"){
      let count=ing.base;
      if(ing.scale&&ratio>1.2)count=Math.ceil(ing.base*ratio);
      if(ing.scale&&ratio<.8)count=Math.max(1,Math.floor(ing.base*ratio));
      const cs=count===.5?"½":count%1!==0?count.toFixed(1):String(count);
      kcal=Math.round(count*(ing.kcalEach||0));
      const us=ing.unit==="slices"?` ${ing.unit}`:"";
      displayLabel=`${cs}${us} ${ing.label}`;
    } else {
      const cs=ing.base===.5?"½":String(ing.base);
      displayLabel=`${cs} ${ing.unit} ${ing.label}`;
      kcal=Math.round((ing.kcalEach||0)*ing.base+(ing.kcalPer100||0)*ing.base/100);
    }
    return{displayLabel,kcal:kcal||0};
  });
}

// The replenishment target card — mirrors the hydration card pattern
const ReplenishCard=({burned,replenish,dishKcal,dishName,sessionColor,eu})=>{
  if(!burned||!replenish)return null;
  const pct=dishKcal?Math.min(100,Math.round((dishKcal/replenish.kcal)*100)):0;
  const barColor=pct>=85?"#4ade80":pct>=60?"#f59e0b":"#f87171";
  const showKcal=eu==="kcal"||eu==="both";
  const showKj=eu==="kj"||eu==="both";
  const fmt=(kcal)=>showKcal&&showKj?`${kcal.toLocaleString()} kcal / ${Math.round(kcal*4.184).toLocaleString()} kJ`:showKj?`${Math.round(kcal*4.184).toLocaleString()} kJ`:`${kcal.toLocaleString()} kcal`;

  return(
    <div style={{background:`${sessionColor||"#4ade80"}0a`,border:`1px solid ${sessionColor||"#4ade80"}25`,borderRadius:12,padding:"16px 20px",animation:"fi .4s ease"}}>
      <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:sessionColor||"#4ade80",letterSpacing:"0.12em",marginBottom:14}}>
        🔁 REPLENISHMENT TARGET
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
        {[
          {label:"BURNED",kcal:burned.kcal,color:"#f87171",note:"this session"},
          {label:"REPLENISH",kcal:replenish.kcal,color:sessionColor||"#4ade80",note:`${Math.round(replenish.rate*100)}% of burn`},
          {label:"THIS DISH",kcal:dishKcal||null,color:"#60a5fa",note:dishName||"select meal"},
        ].map(({label,kcal,color,note})=>(
          <div key={label} style={{background:"#080f1a",borderRadius:10,padding:"12px 14px",border:"1px solid #0f172a"}}>
            <div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#475569",letterSpacing:"0.1em",marginBottom:6}}>{label}</div>
            {kcal?(
              <>
                {showKcal&&<div style={{fontSize:18,fontWeight:700,color,fontFamily:"'Space Mono',monospace",lineHeight:1}}>{kcal.toLocaleString()}</div>}
                {showKcal&&<div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#334155",marginBottom:showKj?3:0}}>kcal</div>}
                {showKj&&<div style={{fontSize:showKcal?14:18,fontWeight:showKcal?500:700,color:showKcal?"#64748b":color,fontFamily:"'Space Mono',monospace",lineHeight:1}}>{Math.round(kcal*4.184).toLocaleString()}</div>}
                {showKj&&<div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#334155"}}>kJ</div>}
              </>
            ):(
              <div style={{fontSize:18,fontWeight:700,color:"#334155",fontFamily:"'Space Mono',monospace"}}>—</div>
            )}
            <div style={{fontSize:10,color:"#334155",marginTop:5}}>{note}</div>
          </div>
        ))}
      </div>
      {dishKcal&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,flexWrap:"wrap",gap:4}}>
            <span style={{fontSize:12,color:"#64748b"}}>Dish covers <strong style={{color:barColor}}>{pct}%</strong> of your replenishment target</span>
            {pct<100&&<span style={{fontSize:12,color:"#475569"}}>+{fmt(replenish.kcal-dishKcal)} still needed</span>}
          </div>
          <div style={{height:8,borderRadius:4,background:"#0f172a",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:barColor,borderRadius:4,transition:"width .6s ease"}}/>
          </div>
          <div style={{marginTop:8,fontSize:12,color:pct>=85?"#4ade80":"#64748b"}}>
            {pct>=85?"✓ This dish meets your recovery energy target":"💡 Top up with e.g. a banana (89 kcal / 372 kJ) + protein bar (~200 kcal / 837 kJ)"}
          </div>
        </div>
      )}
    </div>
  );
};

                    <Pill color={s.color}>{s.tag}</Pill>
                  </div>
                  <div style={{fontWeight:600,fontSize:14,marginBottom:3,color:selected===s.id?"#f8fafc":"#cbd5e1"}}>{s.label}</div>
                  <div style={{fontSize:11,color:"#475569",marginBottom:6}}>{s.description}</div>
                  {s.id!=="rest"&&<div style={{fontFamily:"'Space Mono',monospace",fontSize:10,color:selected===s.id?s.color:"#334155"}}>{durations[s.id]||DEFAULT_DUR[s.id]} min</div>}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* STATS ROW */}
        {(selected||carbLoad)&&(
          <div style={{animation:"fi .4s ease",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12,marginBottom:16}}>
            {macros&&(
              <div style={{background:"#0c1420",border:"1px solid #1e293b",borderRadius:12,padding:"16px 20px"}}>
                <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#475569",letterSpacing:"0.12em",marginBottom:10}}>
                  {carbLoad?"CARB LOAD TARGETS":"POST-RUN MACRO TARGETS"}
                  {kg&&<span style={{color:"#334155"}}> / {kg.toFixed(1)}kg{dur&&!carbLoad?` · ${dur}min`:""}</span>}
                </div>
                <MacroBar {...macros}/>
                <div style={{marginTop:14,borderTop:"1px solid #0f172a",paddingTop:12,display:"flex",gap:8}}>
                  {showKcal&&<div style={{background:"#080f1a",borderRadius:8,padding:"8px 12px",minWidth:80}}>
                    <div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#475569",marginBottom:2}}>kcal</div>
                    <div style={{fontSize:20,fontWeight:700,color:sess?.color||"#60a5fa",fontFamily:"'Space Mono',monospace"}}>{macros.kcal.toLocaleString()}</div>
                  </div>}
                  {showKj&&<div style={{background:"#080f1a",borderRadius:8,padding:"8px 12px",minWidth:80}}>
                    <div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#475569",marginBottom:2}}>kJ</div>
                    <div style={{fontSize:20,fontWeight:700,color:"#a78bfa",fontFamily:"'Space Mono',monospace"}}>{macros.kj.toLocaleString()}</div>
                  </div>}
                </div>
              </div>
            )}
            {burned&&!carbLoad&&(
              <div style={{background:"#0c1420",border:"1px solid #1e293b",borderRadius:12,padding:"16px 20px"}}>
                <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#475569",letterSpacing:"0.12em",marginBottom:10}}>ESTIMATED BURN · {dur} min</div>
                <div style={{display:"flex",gap:8}}>
                  {showKcal&&<div style={{background:"#080f1a",borderRadius:8,padding:"8px 12px",minWidth:80}}>
                    <div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#475569",marginBottom:2}}>kcal</div>
                    <div style={{fontSize:20,fontWeight:700,color:sess?.color,fontFamily:"'Space Mono',monospace"}}>{burned.kcal.toLocaleString()}</div>
                  </div>}
                  {showKj&&<div style={{background:"#080f1a",borderRadius:8,padding:"8px 12px",minWidth:80}}>
                    <div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#475569",marginBottom:2}}>kJ</div>
                    <div style={{fontSize:20,fontWeight:700,color:"#a78bfa",fontFamily:"'Space Mono',monospace"}}>{burned.kj.toLocaleString()}</div>
                  </div>}
                </div>
                <div style={{marginTop:10,fontSize:12,color:"#475569",lineHeight:1.5}}>MET-based estimate. Varies ±15% with fitness, terrain, conditions.</div>
              </div>
            )}
            {hydration&&(
              <div style={{background:`${prof.color}0d`,border:`1px solid ${prof.color}25`,borderRadius:12,padding:"16px 20px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{fontSize:16}}>{prof.icon}</span>
                  <span style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:prof.color,letterSpacing:"0.1em"}}>HYDRATION TARGET</span>
                </div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:38,color:prof.color,letterSpacing:"0.04em",lineHeight:1}}>{hydration}ml</div>
                <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>{(hydration/1000).toFixed(1)}L post-run · {prof.label}</div>
                <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6}}>{prof.elec}</div>
                {prof.cramp&&<div style={{marginTop:8,background:`${prof.color}15`,borderRadius:8,padding:"8px 12px",fontSize:12,color:"#94a3b8"}}><strong style={{color:prof.color}}>⚡ </strong>{prof.cramp}</div>}
              </div>
            )}
          </div>
        )}

        {/* REPLENISHMENT CARD */}
        {burned&&replenish&&!carbLoad&&(
          <div style={{marginBottom:16}}>
            <ReplenishCard burned={burned} replenish={replenish} dishKcal={dishKcal} dishName={meals[activeMeal]?.name} sessionColor={sess?.color} eu={eu}/>
          </div>
        )}

        {/* MEALS PANEL */}
        {(selected||carbLoad)&&meals.length>0&&(
          <div style={{animation:"fi .4s ease"}}>
            <div style={{background:"#0c1420",border:"1px solid #1e293b",borderRadius:"12px 12px 0 0",borderBottom:"none",padding:"14px 18px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <span style={{fontSize:24}}>{carbLoad?"🏅":sess?.icon}</span>
              <div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:"0.06em",color:"#f8fafc"}}>
                  {carbLoad?"CARB LOADING — RACE WEEK MEALS":sess?.label.toUpperCase()+" — NUTRITION PLAN"}
                </div>
                {!carbLoad&&selected&&<div style={{fontSize:11,color:sess?.color,fontFamily:"'Space Mono',monospace"}}>{TIMING[selected]}</div>}
              </div>
            </div>
            <div style={{background:"#080f1a",borderLeft:"1px solid #1e293b",borderRight:"1px solid #1e293b",padding:"8px 14px",display:"flex",gap:4,flexWrap:"wrap"}}>
              {["meals","hydration","tips"].map(t=>(
                <button key={t} onClick={()=>setTab(t)} style={{padding:"7px 16px",borderRadius:7,fontSize:13,fontWeight:600,border:"none",cursor:"pointer",background:tab===t?"#1e293b":"transparent",color:tab===t?"#f8fafc":"#475569",transition:"all .18s",textTransform:"capitalize"}}>
                  {t==="tips"?"Tips & Avoid":t.charAt(0).toUpperCase()+t.slice(1)}
                </button>
              ))}
            </div>

            {/* MEALS TAB */}
            {tab==="meals"&&(
              <div style={{background:"#0c1420",border:"1px solid #1e293b",borderTop:`2px solid ${carbLoad?"#60a5fa":sess?.color}`}}>
                <div style={{padding:"12px 14px",borderBottom:"1px solid #0f172a",overflowX:"auto"}}>
                  <div style={{display:"flex",gap:6,minWidth:"max-content"}}>
                    {meals.map((m,i)=>(
                      <button key={i} onClick={()=>setActiveMeal(i)} style={{padding:"6px 13px",borderRadius:6,fontSize:12,fontWeight:500,border:"1px solid",borderColor:activeMeal===i?"#334155":"#1e293b",background:activeMeal===i?"#1e293b":"transparent",color:activeMeal===i?"#e2e8f0":"#64748b",cursor:"pointer",whiteSpace:"nowrap",transition:"all .18s"}}>
                        {m.emoji} {m.name}
                      </button>
                    ))}
                  </div>
                </div>
                <div key={`${selected}-${activeMeal}-${carbLoad}`} style={{padding:"22px 20px",animation:"fi .3s ease"}}>
                  {/* Meal header */}
                  <div style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:18}}>
                    <span style={{fontSize:38}}>{meals[activeMeal]?.emoji}</span>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap",marginBottom:6}}>
                        <h3 style={{fontSize:18,fontWeight:700,color:"#f8fafc"}}>{meals[activeMeal]?.name}</h3>
                        {dishKcal&&(
                          <div style={{display:"flex",gap:6,flexShrink:0}}>
                            {showKcal&&<div style={{background:"#080f1a",border:"1px solid #1e293b",borderRadius:7,padding:"4px 10px",textAlign:"center"}}>
                              <div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#475569"}}>kcal</div>
                              <div style={{fontSize:16,fontWeight:700,color:sess?.color||"#4ade80",fontFamily:"'Space Mono',monospace"}}>{dishKcal.toLocaleString()}</div>
                            </div>}
                            {showKj&&<div style={{background:"#080f1a",border:"1px solid #1e293b",borderRadius:7,padding:"4px 10px",textAlign:"center"}}>
                              <div style={{fontSize:9,fontFamily:"'Space Mono',monospace",color:"#475569"}}>kJ</div>
                              <div style={{fontSize:16,fontWeight:700,color:"#a78bfa",fontFamily:"'Space Mono',monospace"}}>{Math.round(dishKcal*4.184).toLocaleString()}</div>
                            </div>}
                          </div>
                        )}
                      </div>
                      <p style={{fontSize:13,color:"#64748b",lineHeight:1.65,marginBottom:10}}>{meals[activeMeal]?.why}</p>
                      <a href={meals[activeMeal]?.recipe} target="_blank" rel="noopener noreferrer"
                        style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,color:"#60a5fa",textDecoration:"none",fontFamily:"'Space Mono',monospace",border:"1px solid #1e3a5f",padding:"5px 12px",borderRadius:6,background:"#0a1929"}}>
                        📖 View Full Recipe ↗
                      </a>
                    </div>
                  </div>
                  {/* Scaled ingredients */}
                  <div style={{borderTop:"1px solid #0f172a",paddingTop:14}}>
                    <div style={{fontSize:10,fontFamily:"'Space Mono',monospace",color:"#334155",letterSpacing:"0.1em",marginBottom:10}}>
                      INGREDIENTS {kg?`— SCALED TO ${kg.toFixed(0)}KG`:"— ENTER WEIGHT TO PERSONALISE QUANTITIES"}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:5}}>
                      {scaledIngs.map((ing,i)=>(
                        <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 12px",background:"#080f1a",borderRadius:8,border:"1px solid #0f172a"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{color:carbLoad?"#60a5fa":sess?.color||"#4ade80",fontSize:10}}>◆</span>
                            <span style={{fontSize:13,color:"#cbd5e1"}}>{ing.displayLabel}</span>
                          </div>
                          {ing.kcal>0&&(
                            <div style={{display:"flex",gap:8,flexShrink:0}}>
                              {showKcal&&<span style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#475569"}}>{ing.kcal} kcal</span>}
                              {showKj&&<span style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#334155"}}>{Math.round(ing.kcal*4.184)} kJ</span>}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                    {dishKcal&&(
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:"#0f1e2e",borderRadius:8,marginTop:6,border:`1px solid ${sess?.color||"#4ade80"}30`}}>
                        <span style={{fontSize:12,fontWeight:700,color:"#e2e8f0"}}>Total</span>
                        <div style={{display:"flex",gap:12}}>
                          {showKcal&&<span style={{fontSize:13,fontWeight:700,fontFamily:"'Space Mono',monospace",color:sess?.color||"#4ade80"}}>{dishKcal.toLocaleString()} kcal</span>}
                          {showKj&&<span style={{fontSize:13,fontWeight:700,fontFamily:"'Space Mono',monospace",color:"#a78bfa"}}>{Math.round(dishKcal*4.184).toLocaleString()} kJ</span>}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* HYDRATION TAB */}
            {tab==="hydration"&&(
              <div style={{background:"#0c1420",border:"1px solid #1e293b",padding:"24px 20px",animation:"fi .3s ease"}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:14}}>
                  <div style={{background:"#080f1a",borderRadius:12,padding:18}}>
                    <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#60a5fa",letterSpacing:"0.1em",marginBottom:10}}>💧 HYDRATION GUIDANCE</div>
                    <p style={{fontSize:13,color:"#94a3b8",lineHeight:1.65}}>
                      {hydration?<><strong style={{color:"#e2e8f0"}}>{hydration}ml ({(hydration/1000).toFixed(1)}L)</strong> — </>:"Enter weight for a personalised target. "}
                      Sip steadily over 1–2 hrs. Every 1kg lost = 1L to replace.
                    </p>
                  </div>
                  <div style={{background:"#080f1a",borderRadius:12,padding:18}}>
                    <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:prof.color,letterSpacing:"0.1em",marginBottom:10}}>{prof.icon} {prof.label.toUpperCase()}</div>
                    <p style={{fontSize:13,color:"#94a3b8",lineHeight:1.65}}>{prof.elec}</p>
                  </div>
                  {prof.cramp&&(
                    <div style={{background:`${prof.color}12`,border:`1px solid ${prof.color}30`,borderRadius:12,padding:18,gridColumn:"1 / -1"}}>
                      <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:prof.color,letterSpacing:"0.1em",marginBottom:8}}>⚡ CRAMPING PROTOCOL</div>
                      <p style={{fontSize:13,color:"#94a3b8",lineHeight:1.65,marginBottom:10}}>{prof.cramp}</p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                        {["Spinach","Pumpkin seeds","Dark chocolate","Almonds","Bananas","Pickle juice","Magnesium glycinate"].map(f=>(
                          <span key={f} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:20,fontSize:12,color:"#94a3b8"}}>
                            <span style={{color:prof.color}}>◆</span>{f}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                  <div style={{background:"#080f1a",borderRadius:12,padding:18}}>
                    <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#4ade80",letterSpacing:"0.1em",marginBottom:10}}>🧂 ELECTROLYTE FOODS</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      {[["Sodium","Salted nuts, miso, broth"],["Potassium","Banana, potato, spinach"],["Magnesium","Dark choc, seeds, legumes"],["Calcium","Dairy, fortified oat milk"]].map(([m,s])=>(
                        <div key={m} style={{padding:"8px 10px",background:"#0c1420",borderRadius:8,border:"1px solid #1e293b"}}>
                          <div style={{fontSize:10,fontFamily:"'Space Mono',monospace",color:"#4ade80",marginBottom:2}}>{m}</div>
                          <div style={{fontSize:12,color:"#64748b"}}>{s}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div style={{background:"#080f1a",borderRadius:12,padding:18}}>
                    <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#f59e0b",letterSpacing:"0.1em",marginBottom:10}}>🟡 URINE COLOUR GUIDE</div>
                    {[["Pale straw","#e8e062","Well hydrated ✓"],["Yellow","#d4b800","Slightly low — drink up"],["Dark yellow","#b07d00","Dehydrated — act now"],["Amber/brown","#7c4a00","Severely dehydrated 🚨"]].map(([label,color,status])=>(
                      <div key={label} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                        <div style={{width:14,height:14,borderRadius:"50%",background:color,flexShrink:0}}/>
                        <span style={{fontSize:12,color:"#64748b"}}>{label} — <span style={{color:"#94a3b8"}}>{status}</span></span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* TIPS TAB */}
            {tab==="tips"&&!carbLoad&&selected&&(
              <div style={{background:"#0c1420",border:"1px solid #1e293b",padding:"24px 20px",animation:"fi .3s ease"}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:14}}>
                  <div style={{background:"#080f1a",borderRadius:12,padding:18}}>
                    <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#f87171",letterSpacing:"0.1em",marginBottom:12}}>🚫 AVOID</div>
                    {(AVOID[selected]||[]).map((item,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<AVOID[selected].length-1?"1px solid #0f172a":"none",fontSize:13,color:"#94a3b8"}}>
                        <span style={{color:"#f87171",fontSize:10,flexShrink:0}}>✕</span>{item}
                      </div>
                    ))}
                  </div>
                  <div style={{background:`${sess?.color}0d`,border:`1px solid ${sess?.color}25`,borderRadius:12,padding:18}}>
                    <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:sess?.color,letterSpacing:"0.1em",marginBottom:12}}>💡 COACH'S TIP</div>
                    <p style={{fontSize:14,color:"#cbd5e1",lineHeight:1.7}}>{TIPS[selected]}</p>
                  </div>
                  <div style={{background:"#080f1a",borderRadius:12,padding:18,gridColumn:"1 / -1"}}>
                    <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#a78bfa",letterSpacing:"0.1em",marginBottom:8}}>⏱️ TIMING & SCIENCE</div>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:sess?.color,letterSpacing:"0.04em",marginBottom:8}}>{TIMING[selected]}</div>
                    <p style={{fontSize:13,color:"#64748b",lineHeight:1.6}}>After exercise, GLUT4 transporters are maximally active — muscles absorb glucose without needing insulin. This anabolic window closes progressively over 2–4 hours. Earlier is always better.</p>
                  </div>
                </div>
              </div>
            )}
            {tab==="tips"&&carbLoad&&(
              <div style={{background:"#0c1420",border:"1px solid #1e293b",padding:"24px 20px",animation:"fi .3s ease"}}>
                <div style={{background:"#0a1929",border:"1px solid #1e3a5f",borderRadius:12,padding:20}}>
                  <div style={{fontSize:11,fontFamily:"'Space Mono',monospace",color:"#60a5fa",letterSpacing:"0.1em",marginBottom:14}}>📋 CARB LOADING PROTOCOL</div>
                  {["Start 2–3 days before race day — not just the night before.","Eat every 2–3 hours. Spread carbs across 5–6 meals, don't binge in one sitting.","Choose low-fibre carbs: white rice, white bread, pasta, bagels, bananas.","Cut back on fat and protein temporarily to make calorie room for carbs.","Avoid new foods or restaurants — race week is not the time to experiment.","You may feel heavier — each gram of glycogen holds ~3g of water. This is completely normal.","Taper your training alongside the carb load — you are storing energy, not burning it."].map((tip,i)=>(
                    <div key={i} style={{display:"flex",gap:10,marginBottom:12,alignItems:"flex-start"}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:"#1e3a5f",border:"1px solid #60a5fa55",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Space Mono',monospace",fontSize:10,color:"#60a5fa",flexShrink:0}}>{i+1}</div>
                      <span style={{fontSize:13,color:"#94a3b8",lineHeight:1.65}}>{tip}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {!selected&&!carbLoad&&(
          <div style={{textAlign:"center",padding:"50px 20px",color:"#1e293b",fontFamily:"'Space Mono',monospace",fontSize:13,letterSpacing:"0.08em"}}>
            ↑ SELECT A SESSION OR ENABLE CARB LOADING TO BEGIN
          </div>
        )}
      </div>
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
