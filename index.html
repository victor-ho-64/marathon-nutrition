<script type="text/babel">

const TODAY=new Date();
const fmtToday=TODAY.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
function daysUntil(ds){const d=new Date(ds+"T00:00:00");return Math.ceil((d-TODAY)/86400000);}
function weeksUntil(ds){return Math.max(0,Math.floor(daysUntil(ds)/7));}

const DEFAULT_DUR={easy:60,interval:45,tempo:55,midweek_long:90,long:150,rest:0};

// ─── CALCULATIONS ─────────────────────────────────────────────────────────────
const calcBurned=(met,kg,mins)=>{
  if(!kg||!mins)return null;
  const kcal=Math.round(met*kg*(mins/60));
  return{kcal,kj:Math.round(kcal*4.184)};
};
const REPLENISH_RATE={easy:.60,interval:.75,tempo:.70,midweek_long:.72,long:.75,rest:.40};
const calcReplenish=(burned,kg,sid)=>{
  if(!burned||!kg)return null;
  const rate=REPLENISH_RATE[sid]||.65;
  const kcal=Math.max(Math.round(burned.kcal*rate),200);
  return{kcal,kj:Math.round(kcal*4.184),rate};
};
const calcMacros=(kg,sid,mins,carbLoad)=>{
  if(!kg)return null;
  if(carbLoad){
    // Race week: 10g/kg carbs, 1.5g/kg protein, fat ~25% of total
    const carbs=Math.round(10*kg);
    const protein=Math.round(1.5*kg);
    const carbProtKcal=carbs*4+protein*4;
    const fat=Math.round((carbProtKcal/0.75*0.25)/9);
    const kcal=carbs*4+protein*4+fat*9;
    return{carbs,protein,fat,kcal,kj:Math.round(kcal*4.184)};
  }
  // ── Evidence-based FULL DAILY targets for endurance athletes ──────────────
  // Carbs: midpoint of session-type ranges (Burke et al. 2011; Thomas et al. 2016 ACSM)
  //   rest 3–5g/kg → 4g/kg | easy 4–6 → 5 | tempo 5–7 → 6
  //   interval 6–8 → 7 | midweek_long 6–8 → 7 | long 7–10 → 8.5
  // Protein: 1.5g/kg/day stable across sessions (ISSN 2017; Moore et al. 2014)
  // Fat: 20–30% of total daily kcal; derived so fat = 25% of total
  //   total = (carbKcal + protKcal) / 0.75  →  fatKcal = total × 0.25
  const CARB_MULT={rest:4,easy:5,tempo:6,interval:7,midweek_long:7,long:8.5};
  const CARB_RANGE={rest:"3–5",easy:"4–6",tempo:"5–7",interval:"6–8",midweek_long:"6–8",long:"7–10"};
  const cMult=CARB_MULT[sid]||5;
  const carbs=Math.round(cMult*kg);
  const protein=Math.round(1.5*kg);
  const carbProtKcal=carbs*4+protein*4;
  const total=Math.round(carbProtKcal/0.75);
  const fatKcal=total-carbProtKcal;
  const fat=Math.round(fatKcal/9);
  const kcal=carbs*4+protein*4+fat*9;
  return{carbs,protein,fat,kcal,kj:Math.round(kcal*4.184),
    carbRange:CARB_RANGE[sid]||"4–6",carbMult:cMult};
};

function scaleIngredients(ingredients,kg){
  const ratio=kg?Math.max(.6,Math.min(2.0,kg/70)):1;
  return ingredients.map(ing=>{
    const r=ing.scale?ratio:1;
    let displayLabel,kcal=0;
    if(ing.unit==="g"||ing.unit==="ml"){
      const qty=Math.round(ing.base*r/5)*5;
      kcal=Math.round((qty/100)*(ing.kcalPer100||0));
      displayLabel=`${qty}${ing.unit} ${ing.label}`;
    } else if(ing.unit===""||ing.unit==="slices"){
      let count=ing.base;
      if(ing.scale&&ratio>1.2)count=Math.ceil(ing.base*ratio);
      if(ing.scale&&ratio<.8)count=Math.max(1,Math.floor(ing.base*ratio));
      const cs=count===.5?"½":count%1!==0?count.toFixed(1):String(count);
      kcal=Math.round(count*(ing.kcalEach||0));
      const us=ing.unit==="slices"?` ${ing.unit}`:"";
      displayLabel=`${cs}${us} ${ing.label}`;
    } else {
      const cs=ing.base===.5?"½":String(ing.base);
      displayLabel=`${cs} ${ing.unit} ${ing.label}`;
      kcal=Math.round((ing.kcalEach||0)*ing.base+(ing.kcalPer100||0)*ing.base/100);
    }
    return{displayLabel,kcal:kcal||0};
  });
}

      </div>

        {[["Carbs",carbs,"#4ade80"],["Protein",protein,"#f59e0b"],["Fat",fat,"#60a5fa"]].map(([l,v,c])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:c}}/>

          </div>
        ))}
      </div>
    </div>
  );
};

const ReplenishCard=({burned,replenish,dishKcal,dishName,sessionColor,eu})=>{
  if(!burned||!replenish)return null;
  const pct=dishKcal?Math.min(100,Math.round((dishKcal/replenish.kcal)*100)):0;
  const barColor=pct>=85?"#4ade80":pct>=60?"#f59e0b":"#f87171";
  const showKcal=eu==="kcal"||eu==="both";
  const showKj=eu==="kj"||eu==="both";
  const fmt=(kcal)=>showKcal&&showKj?`${kcal.toLocaleString()} kcal / ${Math.round(kcal*4.184).toLocaleString()} kJ`:showKj?`${Math.round(kcal*4.184).toLocaleString()} kJ`:`${kcal.toLocaleString()} kcal`;
  return(
    <div style={{background:`${sessionColor||"#4ade80"}0a`,border:`1px solid ${sessionColor||"#4ade80"}25`,borderRadius:12,padding:"16px 20px",animation:"fi .4s ease"}}>
      <div style={{fontSize:11,fontFamily:mono,color:sessionColor||"#4ade80",letterSpacing:"0.12em",marginBottom:14}}>🔁 REPLENISHMENT TARGET</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
        {[{label:"BURNED",kcal:burned.kcal,color:"#f87171",note:"this session"},{label:"REPLENISH",kcal:replenish.kcal,color:sessionColor||"#4ade80",note:`${Math.round(replenish.rate*100)}% of burn`},{label:"THIS DISH",kcal:dishKcal||null,color:"#60a5fa",note:dishName||"select meal"}].map(({label,kcal,color,note})=>(
          <div key={label} style={{background:"#080f1a",borderRadius:10,padding:"12px 14px",border:"1px solid #0f172a"}}>
            <div style={{fontSize:9,fontFamily:mono,color:"#475569",letterSpacing:"0.1em",marginBottom:6}}>{label}</div>
            {kcal?(
              <>
                {showKcal&&<div style={{fontSize:18,fontWeight:700,color,fontFamily:mono,lineHeight:1}}>{kcal.toLocaleString()}</div>}
                {showKcal&&<div style={{fontSize:9,fontFamily:mono,color:"#334155",marginBottom:showKj?3:0}}>kcal</div>}
                {showKj&&<div style={{fontSize:showKcal?14:18,fontWeight:showKcal?500:700,color:showKcal?"#64748b":color,fontFamily:mono,lineHeight:1}}>{Math.round(kcal*4.184).toLocaleString()}</div>}
                {showKj&&<div style={{fontSize:9,fontFamily:mono,color:"#334155"}}>kJ</div>}
              </>
            ):(
              <div style={{fontSize:18,fontWeight:700,color:"#334155",fontFamily:mono}}>—</div>
            )}
            <div style={{fontSize:10,color:"#334155",marginTop:5}}>{note}</div>
          </div>
        ))}
      </div>
      {dishKcal&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,flexWrap:"wrap",gap:4}}>
            <span style={{fontSize:12,color:"#64748b"}}>Dish covers <strong style={{color:barColor}}>{pct}%</strong> of your replenishment target</span>
            {pct<100&&<span style={{fontSize:12,color:"#475569"}}>+{fmt(replenish.kcal-dishKcal)} still needed</span>}
          </div>
          <div style={{height:8,borderRadius:4,background:"#0f172a",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:barColor,borderRadius:4,transition:"width .6s ease"}}/>
          </div>
          <div style={{marginTop:8,fontSize:12,color:pct>=85?"#4ade80":"#64748b"}}>
            {pct>=85?"✓ This dish meets your recovery energy target":"💡 Top up with e.g. a banana (89 kcal / 372 kJ) + protein bar (~200 kcal / 837 kJ)"}
          </div>
        </div>
      )}
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  // localStorage helpers — wrapped in try/catch so preview (no localStorage) doesn't crash
  const ls=(k,fb)=>{try{const v=localStorage.getItem(k);return v!==null?v:fb;}catch{return fb;}};
  const lsNum=(k,fb)=>{try{const v=localStorage.getItem(k);return v!==null?Number(v):fb;}catch{return fb;}};
  const [weight,setWeight]=useState(()=>ls("mf_weight",""));
  const [unit,setUnit]=useState(()=>ls("mf_unit","kg"));
  const [raceDate,setRaceDate]=useState("");
  const [selected,setSelected]=useState(null);
  const [durations,setDurations]=useState({...DEFAULT_DUR});

  const [carbLoad,setCarbLoad]=useState(false);
  const [sweatKey,setSweatKey]=useState(()=>ls("mf_sweat","normal"));
  const [sessionTab,setSessionTab]=useState("pre-run");
  const [eu,setEu]=useState("both");
  const [showEvidence,setShowEvidence]=useState(false);
  const [copied,setCopied]=useState(false);
  const [diet,setDiet]=useState(()=>ls("mf_diet","omni")); // omni | veggie | vegan
  const [gender,setGender]=useState(()=>ls("mf_gender","unset")); // unset | male | female
  // Persist user prefs
  useEffect(()=>{try{localStorage.setItem("mf_weight",weight);}catch{}}, [weight]);
  useEffect(()=>{try{localStorage.setItem("mf_unit",unit);}catch{}}, [unit]);
  useEffect(()=>{try{localStorage.setItem("mf_sweat",sweatKey);}catch{}}, [sweatKey]);
  useEffect(()=>{try{localStorage.setItem("mf_diet",diet);}catch{}}, [diet]);
  useEffect(()=>{try{localStorage.setItem("mf_gender",gender);}catch{}}, [gender]);

  // Diet filter helper
  const filterMeals=(arr)=>{
    if(!arr||arr.length===0)return[];
    if(diet==="omni")return arr;
    const filtered=arr.filter(m=>{
      if(!m.tags)return true; // untagged meals always show
      if(diet==="vegan")return m.tags.includes("vegan");
      if(diet==="veggie")return m.tags.includes("vegan")||m.tags.includes("veggie");
      return true;
    });
    return filtered.length>0?filtered:[];
  };
  const kg=useMemo(()=>weight?(unit==="kg"?parseFloat(weight):parseFloat(weight)*.453592):null,[weight,unit]);
  const sess=useMemo(()=>SESSIONS.find(s=>s.id===selected),[selected]);
  const dur=selected?(durations[selected]||DEFAULT_DUR[selected]):60;
  const weeksOut=useMemo(()=>raceDate?weeksUntil(raceDate):null,[raceDate]);
  // carbLoad unlocks only when race date is set AND ≤7 days away
  const daysOut=raceDate?daysUntil(raceDate):null;
  const carbLoadUnlocked=raceDate!==''&&daysOut!==null&&daysOut<=7;
  const macros=useMemo(()=>kg&&(selected||carbLoad)?calcMacros(kg,selected||"easy",dur,carbLoad):null,[kg,selected,dur,carbLoad]);
  const burned=useMemo(()=>kg&&sess&&dur?calcBurned(sess.met,kg,dur):null,[kg,sess,dur]);
  const replenish=useMemo(()=>burned&&selected?calcReplenish(burned,kg,selected):null,[burned,kg,selected]);
  const hydration=useMemo(()=>{if(!kg||!(selected||carbLoad))return null;return SWEAT[sweatKey].hydFn(kg,selected||"easy",dur);},[kg,selected,dur,sweatKey,carbLoad]);
  const meals=useMemo(()=>{
    const raw=carbLoad?CL_MEALS:(selected?MEALS[selected]:[]);
    return filterMeals(raw);
  },[carbLoad,selected,diet]);
  const prof=SWEAT[sweatKey];

  const scaledIngs=useMemo(()=>{if(!meals[activeMeal])return[];return scaleIngredients(meals[activeMeal].ingredients,kg);},[meals,activeMeal,kg]);
  const dishKcal=useMemo(()=>{if(!meals[activeMeal])return null;return kg?scaledIngs.reduce((s,i)=>s+i.kcal,0):meals[activeMeal].baseKcal;},[scaledIngs,meals,activeMeal,kg]);
  const preData=selected?PRE[selected]:null;
  const preMeals=useMemo(()=>{
    if(!preData||!preData.meals)return[];
    return filterMeals(preData.meals);
  },[preData,diet]);
  const [preMeal,setPreMeal]=useState(0);

  useEffect(()=>{setActiveMeal(0);setPreMeal(0);},[selected,carbLoad,diet]);
  const setDur=(id,val)=>setDurations(d=>({...d,[id]:Math.max(0,Math.min(300,parseInt(val)||0))}));
  const showKcal=eu==="kcal"||eu==="both";
  const showKj=eu==="kj"||eu==="both";

  return(
    <div style={{minHeight:"100vh",background:"#040a0f",paddingBottom:80}}>

      {/* HEADER */}

        <div style={{maxWidth:980,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:"#4ade80",animation:"pulse 2s infinite"}}/>
            <span style={{fontSize:11,fontFamily:mono,color:"#4ade80",letterSpacing:"0.15em"}}>{fmtToday.toUpperCase()}</span>
          </div>
          <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:10}}>
            <h1 style={{fontSize:"clamp(40px,8vw,68px)",fontFamily:bebas,letterSpacing:"0.04em",lineHeight:.95,color:"#f8fafc"}}>
              FUEL YOUR<br/><span style={{color:"#4ade80"}}>MARATHON</span>
            </h1>
            {/* Race countdown chip — simple */}
            {raceDate&&weeksOut!==null&&(

                <div style={{fontSize:9,fontFamily:mono,color:carbLoadUnlocked?"#4ade80":"#475569",letterSpacing:"0.1em",marginBottom:2}}>{carbLoadUnlocked?"🏅 RACE WEEK":"📅 RACE DAY"}</div>
                <div style={{fontFamily:bebas,fontSize:34,color:carbLoadUnlocked?"#4ade80":"#94a3b8",lineHeight:1}}>{weeksOut>0?weeksOut+" WEEKS":"RACE DAY!"}</div>
                <div style={{fontSize:11,color:"#475569",marginTop:2}}>{daysUntil(raceDate)} days · {new Date(raceDate+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</div>
              </div>

          </div>
          <p style={{fontSize:14,color:"#64748b",maxWidth:500,lineHeight:1.65}}>
            Pre-run fuelling, post-run recovery, and training-phase nutrition — all personalised to your weight, session, and race timeline.

      </div>

      <div style={{maxWidth:980,margin:"0 auto",padding:"0 24px"}}>

        {/* ── SETUP ROW ── */}

                                <h3 style={{fontSize:18,fontWeight:700,color:"#f8fafc"}}>{m.name}</h3>
                                <div style={{display:"flex",gap:6,flexShrink:0}}>
                                  {showKcal&&<div style={{background:"#080f1a",border:"1px solid #1e293b",borderRadius:7,padding:"4px 10px",textAlign:"center"}}>
                                    <div style={{fontSize:9,fontFamily:mono,color:"#475569"}}>kcal</div>
                                    <div style={{fontSize:16,fontWeight:700,color:"#60a5fa",fontFamily:mono}}>{total.toLocaleString()}</div>
                                  </div>}
                                  {showKj&&<div style={{background:"#080f1a",border:"1px solid #1e293b",borderRadius:7,padding:"4px 10px",textAlign:"center"}}>
                                    <div style={{fontSize:9,fontFamily:mono,color:"#475569"}}>kJ</div>
                                    <div style={{fontSize:16,fontWeight:700,color:"#a78bfa",fontFamily:mono}}>{Math.round(total*4.184).toLocaleString()}</div>
                                  </div>}
                                </div>
                              </div>
                              <p style={{fontSize:13,color:"#64748b",lineHeight:1.65,marginBottom:10}}>{m.why}</p>
                              <a href={m.recipe} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,color:"#60a5fa",textDecoration:"none",fontFamily:mono,border:"1px solid #1e3a5f",padding:"5px 12px",borderRadius:6,background:"#0a1929"}}>📖 View Full Recipe ↗</a>
                            </div>
                          </div>
                          <div style={{borderTop:"1px solid #0f172a",paddingTop:14}}>
                            <div style={{fontSize:10,fontFamily:mono,color:"#334155",letterSpacing:"0.1em",marginBottom:10}}>
                              INGREDIENTS {kg?`— SCALED TO ${kg.toFixed(0)}KG`:"— ENTER WEIGHT TO PERSONALISE"}
                            </div>
                            <div style={{display:"flex",flexDirection:"column",gap:5}}>
                              {ings.map((ing,i)=>(
                                <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 12px",background:"#080f1a",borderRadius:8,border:"1px solid #0f172a"}}>
                                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                                    <span style={{color:"#60a5fa",fontSize:10}}>◆</span>
                                    <span style={{fontSize:13,color:"#cbd5e1"}}>{ing.displayLabel}</span>
                                  </div>
                                  {ing.kcal>0&&(
                                    <div style={{display:"flex",gap:8,flexShrink:0}}>
                                      {showKcal&&<span style={{fontSize:11,fontFamily:mono,color:"#475569"}}>{ing.kcal} kcal</span>}
                                      {showKj&&<span style={{fontSize:11,fontFamily:mono,color:"#334155"}}>{Math.round(ing.kcal*4.184)} kJ</span>}
                                    </div>
                                  )}
                                </div>
                              ))}
                            </div>
                            {total>0&&(
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:"#0a1929",borderRadius:8,marginTop:6,border:"1px solid #1e3a5f"}}>
                                <span style={{fontSize:12,fontWeight:700,color:"#e2e8f0"}}>Total</span>
                                <div style={{display:"flex",gap:12}}>
                                  {showKcal&&<span style={{fontSize:13,fontWeight:700,fontFamily:mono,color:"#60a5fa"}}>{total.toLocaleString()} kcal</span>}
                                  {showKj&&<span style={{fontSize:13,fontWeight:700,fontFamily:mono,color:"#a78bfa"}}>{Math.round(total*4.184).toLocaleString()} kJ</span>}
                                </div>
                              </div>
                            )}
                          </div>
                          {/* Protocol tips */}
                          <div style={{marginTop:16,background:"#0a1929",border:"1px solid #1e3a5f",borderRadius:12,padding:18}}>
                            <div style={{fontSize:11,fontFamily:mono,color:"#60a5fa",letterSpacing:"0.1em",marginBottom:12}}>📋 CARB LOADING PROTOCOL</div>
                            {["Start 2–3 days before race day — not just the night before.","Eat every 2–3 hours. Spread carbs across 5–6 meals, don't binge in one sitting.","Choose low-fibre carbs: white rice, white bread, pasta, bagels, bananas.","Cut back on fat and protein temporarily to make calorie room for carbs.","Avoid new foods or restaurants — race week is not the time to experiment.","You may feel heavier — each gram of glycogen holds ~3g of water. This is completely normal.","Taper your training alongside the carb load — you are storing energy, not burning it."].map((tip,i)=>(
                              <div key={i} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
                                <div style={{width:20,height:20,borderRadius:"50%",background:"#1e3a5f",border:"1px solid #60a5fa55",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:mono,fontSize:9,color:"#60a5fa",flexShrink:0}}>{i+1}</div>
                                <span style={{fontSize:13,color:"#94a3b8",lineHeight:1.6}}>{tip}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

                {!selected&&!carbLoad&&(
          <div style={{textAlign:"center",padding:"50px 20px",color:"#1e293b",fontFamily:mono,fontSize:13,letterSpacing:"0.08em"}}>
            ↑ SELECT A SESSION OR ENABLE CARB LOADING TO BEGIN
          </div>
        )}
      </div>
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
