<script type="text/babel">

const TODAY=new Date();
const fmtToday=TODAY.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
function daysUntil(ds){const d=new Date(ds+"T00:00:00");return Math.ceil((d-TODAY)/86400000);}
function weeksUntil(ds){return Math.max(0,Math.floor(daysUntil(ds)/7));}

const DEFAULT_DUR={easy:60,interval:45,tempo:55,midweek_long:90,long:150,rest:0};

// ─── CALCULATIONS ─────────────────────────────────────────────────────────────
const calcBurned=(met,kg,mins)=>{
  if(!kg||!mins)return null;
  const kcal=Math.round(met*kg*(mins/60));
  return{kcal,kj:Math.round(kcal*4.184)};
};
const REPLENISH_RATE={easy:.60,interval:.75,tempo:.70,midweek_long:.72,long:.75,rest:.40};
const calcReplenish=(burned,kg,sid)=>{
  if(!burned||!kg)return null;
  const rate=REPLENISH_RATE[sid]||.65;
  const kcal=Math.max(Math.round(burned.kcal*rate),200);
  return{kcal,kj:Math.round(kcal*4.184),rate};
};
const calcMacros=(kg,sid,mins,carbLoad)=>{
  if(!kg)return null;
  if(carbLoad){
    // Race week: 10g/kg carbs, 1.5g/kg protein, fat ~25% of total
    const carbs=Math.round(10*kg);
    const protein=Math.round(1.5*kg);
    const carbProtKcal=carbs*4+protein*4;
    const fat=Math.round((carbProtKcal/0.75*0.25)/9);
    const kcal=carbs*4+protein*4+fat*9;
    return{carbs,protein,fat,kcal,kj:Math.round(kcal*4.184)};
  }
  // ── Evidence-based FULL DAILY targets for endurance athletes ──────────────
  // Carbs: midpoint of session-type ranges (Burke et al. 2011; Thomas et al. 2016 ACSM)
  //   rest 3–5g/kg → 4g/kg | easy 4–6 → 5 | tempo 5–7 → 6
  //   interval 6–8 → 7 | midweek_long 6–8 → 7 | long 7–10 → 8.5
  // Protein: 1.5g/kg/day stable across sessions (ISSN 2017; Moore et al. 2014)
  // Fat: 20–30% of total daily kcal; derived so fat = 25% of total
  //   total = (carbKcal + protKcal) / 0.75  →  fatKcal = total × 0.25
  const CARB_MULT={rest:4,easy:5,tempo:6,interval:7,midweek_long:7,long:8.5};
  const CARB_RANGE={rest:"3–5",easy:"4–6",tempo:"5–7",interval:"6–8",midweek_long:"6–8",long:"7–10"};
  const cMult=CARB_MULT[sid]||5;
  const carbs=Math.round(cMult*kg);
  const protein=Math.round(1.5*kg);
  const carbProtKcal=carbs*4+protein*4;
  const total=Math.round(carbProtKcal/0.75);
  const fatKcal=total-carbProtKcal;
  const fat=Math.round(fatKcal/9);
  const kcal=carbs*4+protein*4+fat*9;
  return{carbs,protein,fat,kcal,kj:Math.round(kcal*4.184),
    carbRange:CARB_RANGE[sid]||"4–6",carbMult:cMult};
};

function scaleIngredients(ingredients,kg){
  const ratio=kg?Math.max(.6,Math.min(2.0,kg/70)):1;
  return ingredients.map(ing=>{
    const r=ing.scale?ratio:1;
    let displayLabel,kcal=0;
    if(ing.unit==="g"||ing.unit==="ml"){
      const qty=Math.round(ing.base*r/5)*5;
      kcal=Math.round((qty/100)*(ing.kcalPer100||0));
      displayLabel=`${qty}${ing.unit} ${ing.label}`;
    } else if(ing.unit===""||ing.unit==="slices"){
      let count=ing.base;
      if(ing.scale&&ratio>1.2)count=Math.ceil(ing.base*ratio);
      if(ing.scale&&ratio<.8)count=Math.max(1,Math.floor(ing.base*ratio));
      const cs=count===.5?"½":count%1!==0?count.toFixed(1):String(count);
      kcal=Math.round(count*(ing.kcalEach||0));
      const us=ing.unit==="slices"?` ${ing.unit}`:"";
      displayLabel=`${cs}${us} ${ing.label}`;
    } else {
      const cs=ing.base===.5?"½":String(ing.base);
      displayLabel=`${cs} ${ing.unit} ${ing.label}`;
      kcal=Math.round((ing.kcalEach||0)*ing.base+(ing.kcalPer100||0)*ing.base/100);
    }
    return{displayLabel,kcal:kcal||0};
  });
}

      </div>

        {[["Carbs",carbs,"#4ade80"],["Protein",protein,"#f59e0b"],["Fat",fat,"#60a5fa"]].map(([l,v,c])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:c}}/>

          </div>
        ))}
      </div>
    </div>
  );
};

const ReplenishCard=({burned,replenish,dishKcal,dishName,sessionColor,eu})=>{
  if(!burned||!replenish)return null;
  const pct=dishKcal?Math.min(100,Math.round((dishKcal/replenish.kcal)*100)):0;
  const barColor=pct>=85?"#4ade80":pct>=60?"#f59e0b":"#f87171";
  const showKcal=eu==="kcal"||eu==="both";
  const showKj=eu==="kj"||eu==="both";
  const fmt=(kcal)=>showKcal&&showKj?`${kcal.toLocaleString()} kcal / ${Math.round(kcal*4.184).toLocaleString()} kJ`:showKj?`${Math.round(kcal*4.184).toLocaleString()} kJ`:`${kcal.toLocaleString()} kcal`;
  return(
    <div style={{background:`${sessionColor||"#4ade80"}0a`,border:`1px solid ${sessionColor||"#4ade80"}25`,borderRadius:12,padding:"16px 20px",animation:"fi .4s ease"}}>
      <div style={{fontSize:11,fontFamily:mono,color:sessionColor||"#4ade80",letterSpacing:"0.12em",marginBottom:14}}>🔁 REPLENISHMENT TARGET</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
        {[{label:"BURNED",kcal:burned.kcal,color:"#f87171",note:"this session"},{label:"REPLENISH",kcal:replenish.kcal,color:sessionColor||"#4ade80",note:`${Math.round(replenish.rate*100)}% of burn`},{label:"THIS DISH",kcal:dishKcal||null,color:"#60a5fa",note:dishName||"select meal"}].map(({label,kcal,color,note})=>(
          <div key={label} style={{background:"#080f1a",borderRadius:10,padding:"12px 14px",border:"1px solid #0f172a"}}>
            <div style={{fontSize:9,fontFamily:mono,color:"#475569",letterSpacing:"0.1em",marginBottom:6}}>{label}</div>
            {kcal?(
              <>
                {showKcal&&<div style={{fontSize:18,fontWeight:700,color,fontFamily:mono,lineHeight:1}}>{kcal.toLocaleString()}</div>}
                {showKcal&&<div style={{fontSize:9,fontFamily:mono,color:"#334155",marginBottom:showKj?3:0}}>kcal</div>}
                {showKj&&<div style={{fontSize:showKcal?14:18,fontWeight:showKcal?500:700,color:showKcal?"#64748b":color,fontFamily:mono,lineHeight:1}}>{Math.round(kcal*4.184).toLocaleString()}</div>}
                {showKj&&<div style={{fontSize:9,fontFamily:mono,color:"#334155"}}>kJ</div>}
              </>
            ):(
              <div style={{fontSize:18,fontWeight:700,color:"#334155",fontFamily:mono}}>—</div>
            )}
            <div style={{fontSize:10,color:"#334155",marginTop:5}}>{note}</div>
          </div>
        ))}
      </div>
      {dishKcal&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,flexWrap:"wrap",gap:4}}>
            <span style={{fontSize:12,color:"#64748b"}}>Dish covers <strong style={{color:barColor}}>{pct}%</strong> of your replenishment target</span>
            {pct<100&&<span style={{fontSize:12,color:"#475569"}}>+{fmt(replenish.kcal-dishKcal)} still needed</span>}
          </div>
          <div style={{height:8,borderRadius:4,background:"#0f172a",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:barColor,borderRadius:4,transition:"width .6s ease"}}/>
          </div>
          <div style={{marginTop:8,fontSize:12,color:pct>=85?"#4ade80":"#64748b"}}>
            {pct>=85?"✓ This dish meets your recovery energy target":"💡 Top up with e.g. a banana (89 kcal / 372 kJ) + protein bar (~200 kcal / 837 kJ)"}
          </div>
        </div>
      )}
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){

  const [bonkCarbs,setBonkCarbs]=useState(()=>ls("mf_bcarbs","60"));
  const [bonkGlycogen,setBonkGlycogen]=useState(()=>ls("mf_bglyc","450"));

  const [gender,setGender]=useState(()=>ls("mf_gender","unset")); // unset | male | female
  // Persist user prefs
  useEffect(()=>{try{localStorage.setItem("mf_weight",weight);}catch{}}, [weight]);

  useEffect(()=>{try{localStorage.setItem("mf_diet",diet);}catch{}}, [diet]);

  useEffect(()=>{try{localStorage.setItem("mf_rdtime",targetTime);}catch{}}, [targetTime]);
  useEffect(()=>{try{localStorage.setItem("mf_bwt",bonkWeight);}catch{}}, [bonkWeight]);
  useEffect(()=>{try{localStorage.setItem("mf_btime",bonkTime);}catch{}}, [bonkTime]);
  useEffect(()=>{try{localStorage.setItem("mf_bcarbs",bonkCarbs);}catch{}}, [bonkCarbs]);
  useEffect(()=>{try{localStorage.setItem("mf_bglyc",bonkGlycogen);}catch{}}, [bonkGlycogen]);
  useEffect(()=>{try{localStorage.setItem("mf_bexp",bonkExp);}catch{}}, [bonkExp]);

  // Diet filter helper
  const filterMeals=(arr)=>{
    if(!arr||arr.length===0)return[];
    if(diet==="omni")return arr;
    const filtered=arr.filter(m=>{
      if(!m.tags)return true; // untagged meals always show
      if(diet==="vegan")return m.tags.includes("vegan");
      if(diet==="veggie")return m.tags.includes("vegan")||m.tags.includes("veggie");
      return true;
    });
    return filtered.length>0?filtered:[];
  };
  const kg=useMemo(()=>weight?(unit==="kg"?parseFloat(weight):parseFloat(weight)*.453592):null,[weight,unit]);
  const sess=useMemo(()=>SESSIONS.find(s=>s.id===selected),[selected]);
  const dur=selected?(durations[selected]||DEFAULT_DUR[selected]):60;
  const weeksOut=useMemo(()=>raceDate?weeksUntil(raceDate):null,[raceDate]);
  // carbLoad unlocks only when race date is set AND ≤7 days away
  const daysOut=raceDate?daysUntil(raceDate):null;
  const carbLoadUnlocked=raceDate!==''&&daysOut!==null&&daysOut<=7;
  const macros=useMemo(()=>kg&&(selected||carbLoad)?calcMacros(kg,selected||"easy",dur,carbLoad):null,[kg,selected,dur,carbLoad]);
  const burned=useMemo(()=>kg&&sess&&dur?calcBurned(sess.met,kg,dur):null,[kg,sess,dur]);
  const replenish=useMemo(()=>burned&&selected?calcReplenish(burned,kg,selected):null,[burned,kg,selected]);
  const hydration=useMemo(()=>{if(!kg||!(selected||carbLoad))return null;return SWEAT[sweatKey].hydFn(kg,selected||"easy",dur);},[kg,selected,dur,sweatKey,carbLoad]);
  const meals=useMemo(()=>{

  },[carbLoad,selected,diet]);
  const prof=SWEAT[sweatKey];

  const scaledIngs=useMemo(()=>{if(!meals[activeMeal])return[];return scaleIngredients(meals[activeMeal].ingredients,kg);},[meals,activeMeal,kg]);
  const dishKcal=useMemo(()=>{if(!meals[activeMeal])return null;return kg?scaledIngs.reduce((s,i)=>s+i.kcal,0):meals[activeMeal].baseKcal;},[scaledIngs,meals,activeMeal,kg]);
  const preData=selected?PRE[selected]:null;
  const preMeals=useMemo(()=>{
    if(!preData||!preData.meals)return[];

  // Pre-fill bonk calculator from setup weight + race day target time
  useEffect(()=>{

    }
  },[weight,unit]);
  useEffect(()=>{
    if(targetTime&&targetTime!=="")setBonkTime(targetTime);
  },[targetTime]);
  const setDur=(id,val)=>setDurations(d=>({...d,[id]:Math.max(0,Math.min(300,parseInt(val)||0))}));
  const showKcal=eu==="kcal"||eu==="both";
  const showKj=eu==="kj"||eu==="both";

        <div style={{maxWidth:980,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:"#4ade80",animation:"pulse 2s infinite"}}/>
            <span style={{fontSize:11,fontFamily:mono,color:"#4ade80",letterSpacing:"0.15em"}}>{fmtToday.toUpperCase()}</span>
          </div>
          <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:10}}>
            <h1 style={{fontSize:"clamp(40px,8vw,68px)",fontFamily:bebas,letterSpacing:"0.04em",lineHeight:.95,color:"#f8fafc"}}>
              FUEL YOUR<br/><span style={{color:"#4ade80"}}>MARATHON</span>
            </h1>
            {/* Race countdown chip — simple */}
            {raceDate&&weeksOut!==null&&(
              <div style={{background:carbLoadUnlocked?"#0d2318":"#0c1420",border:`1px solid ${carbLoadUnlocked?"#4ade80":"#1e293b"}`,borderRadius:12,padding:"12px 18px",textAlign:"right"}}>
                <div style={{fontSize:9,fontFamily:mono,color:carbLoadUnlocked?"#4ade80":"#475569",letterSpacing:"0.1em",marginBottom:2}}>{carbLoadUnlocked?"🏅 RACE WEEK":"📅 RACE DAY"}</div>
                <div style={{fontFamily:bebas,fontSize:34,color:carbLoadUnlocked?"#4ade80":"#94a3b8",lineHeight:1}}>{weeksOut>0?weeksOut+" WEEKS":"RACE DAY!"}</div>
                <div style={{fontSize:11,color:"#475569",marginTop:2}}>{daysUntil(raceDate)} days · {new Date(raceDate+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</div>
              </div>
            )}
          </div>
          <p style={{fontSize:14,color:"#64748b",maxWidth:500,lineHeight:1.65}}>
            Pre-run fuelling, post-run recovery, and training-phase nutrition — all personalised to your weight, session, and race timeline.
          </p>
        </div>
      </div>

      <div style={{maxWidth:980,margin:"0 auto",padding:"0 24px"}}>

        {/* ── First-time onboarding banner ── */}
        {!onboardingDone&&(
          <div style={{animation:"fi .4s ease",marginTop:20,marginBottom:4,background:"linear-gradient(135deg,#0d2318,#091a10)",border:"1px solid #4ade8035",borderRadius:14,padding:"16px 20px",display:"flex",alignItems:"flex-start",gap:14,position:"relative"}}>
            <span style={{fontSize:22,flexShrink:0}}>👋</span>

                      <div style={{fontSize:11,fontFamily:mono,color:"#475569",letterSpacing:"0.12em",marginBottom:10}}>
                        CARB LOAD TARGETS{kg&&<span style={{color:"#334155"}}> / {kg.toFixed(1)}kg</span>}
                      </div>
                      <MacroBar carbs={macros.carbs} protein={macros.protein} fat={macros.fat}/>
                      <div style={{marginTop:14,borderTop:"1px solid #0f172a",paddingTop:12,display:"flex",gap:8,flexWrap:"wrap"}}>
                        {showKcal&&<div style={{background:"#080f1a",borderRadius:8,padding:"8px 12px",minWidth:80}}>
                          <div style={{fontSize:9,fontFamily:mono,color:"#475569",marginBottom:2}}>kcal/day</div>
                          <div style={{fontSize:20,fontWeight:700,color:"#60a5fa",fontFamily:mono}}>{macros.kcal.toLocaleString()}</div>
                        </div>}
                        {showKj&&<div style={{background:"#080f1a",borderRadius:8,padding:"8px 12px",minWidth:80}}>
                          <div style={{fontSize:9,fontFamily:mono,color:"#475569",marginBottom:2}}>kJ/day</div>
                          <div style={{fontSize:20,fontWeight:700,color:"#a78bfa",fontFamily:mono}}>{macros.kj.toLocaleString()}</div>
                        </div>}
                        <div style={{background:"#080f1a",borderRadius:8,padding:"8px 12px",minWidth:80}}>
                          <div style={{fontSize:9,fontFamily:mono,color:"#475569",marginBottom:2}}>carbs/day</div>
                          <div style={{fontSize:20,fontWeight:700,color:"#60a5fa",fontFamily:mono}}>{macros.carbs}g</div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Meal tabs */}
                  <div style={{background:"#0c1420",border:"1px solid #1e3a5f",borderRadius:"12px 12px 0 0",borderBottom:"none",padding:"14px 18px",display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:22}}>🏅</span>
                    <div style={{fontFamily:bebas,fontSize:18,letterSpacing:"0.06em",color:"#f8fafc"}}>RACE WEEK MEALS</div>
                  </div>
                  <div style={{background:"#080f1a",borderLeft:"1px solid #1e3a5f",borderRight:"1px solid #1e3a5f",padding:"10px 14px",overflowX:"auto"}}>
                    <div style={{display:"flex",gap:6,minWidth:"max-content"}}>
                      {CL_MEALS.map((m,i)=>(
                        <button key={i} onClick={()=>setActiveMeal(i)} style={{padding:"6px 12px",borderRadius:6,fontSize:12,fontWeight:500,border:"1px solid",borderColor:activeMeal===i?"#334155":"#1e293b",background:activeMeal===i?"#1e293b":"transparent",color:activeMeal===i?"#e2e8f0":"#64748b",cursor:"pointer",whiteSpace:"nowrap",transition:"all .18s"}}>{m.emoji} {m.name}</button>
                      ))}
                    </div>
                  </div>
                  <div style={{background:"#0c1420",border:"1px solid #1e3a5f",borderTop:"2px solid #60a5fa",padding:"20px",animation:"fi .3s ease"}}>
                    {CL_MEALS[activeMeal]&&(()=>{
                      const m=CL_MEALS[activeMeal];
                      const ings=scaleIngredients(m.ingredients,kg);
                      const total=kg?ings.reduce((s,i)=>s+i.kcal,0):m.baseKcal;
                      return(
                        <div>
                          <div style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:18}}>
                            <span style={{fontSize:36}}>{m.emoji}</span>
                            <div style={{flex:1}}>
                              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap",marginBottom:6}}>
                                <h3 style={{fontSize:18,fontWeight:700,color:"#f8fafc"}}>{m.name}</h3>
                                <div style={{display:"flex",gap:6,flexShrink:0}}>
                                  {showKcal&&<div style={{background:"#080f1a",border:"1px solid #1e293b",borderRadius:7,padding:"4px 10px",textAlign:"center"}}>
                                    <div style={{fontSize:9,fontFamily:mono,color:"#475569"}}>kcal</div>
                                    <div style={{fontSize:16,fontWeight:700,color:"#60a5fa",fontFamily:mono}}>{total.toLocaleString()}</div>
                                  </div>}
                                  {showKj&&<div style={{background:"#080f1a",border:"1px solid #1e293b",borderRadius:7,padding:"4px 10px",textAlign:"center"}}>
                                    <div style={{fontSize:9,fontFamily:mono,color:"#475569"}}>kJ</div>
                                    <div style={{fontSize:16,fontWeight:700,color:"#a78bfa",fontFamily:mono}}>{Math.round(total*4.184).toLocaleString()}</div>
                                  </div>}
                                </div>
                              </div>
                              <p style={{fontSize:13,color:"#64748b",lineHeight:1.65,marginBottom:10}}>{m.why}</p>
                              <a href={m.recipe} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,color:"#60a5fa",textDecoration:"none",fontFamily:mono,border:"1px solid #1e3a5f",padding:"5px 12px",borderRadius:6,background:"#0a1929"}}>📖 View Full Recipe ↗</a>
                            </div>
                          </div>
                          <div style={{borderTop:"1px solid #0f172a",paddingTop:14}}>
                            <div style={{fontSize:10,fontFamily:mono,color:"#334155",letterSpacing:"0.1em",marginBottom:10}}>
                              INGREDIENTS {kg?`— SCALED TO ${kg.toFixed(0)}KG`:"— ENTER WEIGHT TO PERSONALISE"}
                            </div>
                            <div style={{display:"flex",flexDirection:"column",gap:5}}>
                              {ings.map((ing,i)=>(
                                <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 12px",background:"#080f1a",borderRadius:8,border:"1px solid #0f172a"}}>
                                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                                    <span style={{color:"#60a5fa",fontSize:10}}>◆</span>
                                    <span style={{fontSize:13,color:"#cbd5e1"}}>{ing.displayLabel}</span>
                                  </div>
                                  {ing.kcal>0&&(
                                    <div style={{display:"flex",gap:8,flexShrink:0}}>
                                      {showKcal&&<span style={{fontSize:11,fontFamily:mono,color:"#475569"}}>{ing.kcal} kcal</span>}
                                      {showKj&&<span style={{fontSize:11,fontFamily:mono,color:"#334155"}}>{Math.round(ing.kcal*4.184)} kJ</span>}
                                    </div>
                                  )}
                                </div>
                              ))}
                            </div>
                            {total>0&&(
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:"#0a1929",borderRadius:8,marginTop:6,border:"1px solid #1e3a5f"}}>
                                <span style={{fontSize:12,fontWeight:700,color:"#e2e8f0"}}>Total</span>
                                <div style={{display:"flex",gap:12}}>
                                  {showKcal&&<span style={{fontSize:13,fontWeight:700,fontFamily:mono,color:"#60a5fa"}}>{total.toLocaleString()} kcal</span>}
                                  {showKj&&<span style={{fontSize:13,fontWeight:700,fontFamily:mono,color:"#a78bfa"}}>{Math.round(total*4.184).toLocaleString()} kJ</span>}
                                </div>
                              </div>
                            )}
                          </div>
                          {/* Protocol tips */}
                          <div style={{marginTop:16,background:"#0a1929",border:"1px solid #1e3a5f",borderRadius:12,padding:18}}>
                            <div style={{fontSize:11,fontFamily:mono,color:"#60a5fa",letterSpacing:"0.1em",marginBottom:12}}>📋 CARB LOADING PROTOCOL</div>
                            {["Start 2–3 days before race day — not just the night before.","Eat every 2–3 hours. Spread carbs across 5–6 meals, don't binge in one sitting.","Choose low-fibre carbs: white rice, white bread, pasta, bagels, bananas.","Cut back on fat and protein temporarily to make calorie room for carbs.","Avoid new foods or restaurants — race week is not the time to experiment.","You may feel heavier — each gram of glycogen holds ~3g of water. This is completely normal.","Taper your training alongside the carb load — you are storing energy, not burning it."].map((tip,i)=>(
                              <div key={i} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
                                <div style={{width:20,height:20,borderRadius:"50%",background:"#1e3a5f",border:"1px solid #60a5fa55",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:mono,fontSize:9,color:"#60a5fa",flexShrink:0}}>{i+1}</div>
                                <span style={{fontSize:13,color:"#94a3b8",lineHeight:1.6}}>{tip}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        
        {/* ═══════════════════════════════════════════════════════════════
            RACE DAY MODE
        ═══════════════════════════════════════════════════════════════ */}
        <div style={{marginTop:32,borderTop:"1px solid #0f172a",paddingTop:24}}>

          {/* ── Section header ── */}
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
              <span style={{fontSize:22}}>🏁</span>
              <span style={{fontFamily:bebas,fontSize:22,letterSpacing:"0.06em",color:"#f8fafc"}}>RACE DAY MODE</span>
              <Pill color="#f59e0b">MARATHON DAY</Pill>
            </div>
            <p style={{fontSize:13,color:"#64748b",lineHeight:1.6,maxWidth:640}}>
              A complete race day fuelling plan — from your wake-up alarm to your finish line recovery. Personalised to your target finish time and body weight.
            </p>
          </div>

          {/* ── Locked: no race date ── */}
          {!raceDate&&(
            <div style={{background:"#0c1420",border:"1px dashed #1e293b",borderRadius:14,padding:"20px 24px",display:"flex",alignItems:"center",gap:16}}>
              <span style={{fontSize:28}}>🔒</span>
              <div>
                <div style={{fontSize:14,fontWeight:600,color:"#475569",marginBottom:4}}>Enter your race date to unlock Race Day Mode</div>
                <div style={{fontSize:13,color:"#334155",lineHeight:1.5}}>Add your race date in the setup section above. Race Day Mode activates on the day of your race.</div>
              </div>
            </div>
          )}

          {/* ── Has race date: show always ── */}
          {raceDate&&(()=>{
            // ── Computed race day values ──────────────────────────────────
            const isRaceDay = daysOut===0;
            const daysToRace = daysOut;

            // Parse target time → total minutes
            const parseTime=(s)=>{
              const p=s.split(":").map(Number);
              return p.length===2?p[0]*60+p[1]:p[0]*60;
            };
            const totalRaceMinutes=parseTime(targetTime)||210;
            const hrs=totalRaceMinutes/60;

            // In-run fuelling — evidence-based targets (Jeukendrup 2014; Burke et al. 2011)
            // Single-source glucose gels (SiS isotonic): SGLT1 saturates at ~60g/hr max
            // Multiple-transporter gels (glucose+fructose — Maurten, Precision, Beta Fuel):
            //   up to 90g/hr for events >2.5hr; up to 120g/hr with gut training (elite)
            // For a marathon (2.5–5hr): target 60–90g/hr using multi-transporter gels
            // Conservative default = 60g/hr (accessible to gut-trained recreational runners)
            const carbsPerHrLow  = 60;  // g/hr — minimum evidence-based target (Jeukendrup 2014)
            const carbsPerHrHigh = 90;  // g/hr — upper target using multi-transporter gels
            const carbsPerHr = carbsPerHrLow; // used for gel schedule (conservative default)
            const gelCarbsG  = 25; // verified: Maurten Gel 100 = 25g, Clif Shot = 25g, PF30 = 30g
            const gelIntervalMins = Math.round(gelCarbsG / (carbsPerHr/60));
            // First gel at 45 min, then every gelIntervalMins
            const gelTimes=[];
            let t=45;
            while(t < totalRaceMinutes-15){gelTimes.push(t);t+=gelIntervalMins;}
            const totalGels=gelTimes.length;
            const totalInRunCarbs=Math.round(totalGels*gelCarbsG);

            // Wake-up and start time (assume 9:00 race start for display)
            const RACE_START_MINS = 9*60; // 9:00 AM
            const fmtMins=(m)=>{const hh=Math.floor(m/60)%24,mm=m%60;return`${hh}:${String(mm).padStart(2,"0")}`;}

            // Pre-race breakfast: 2.5–3hr before start
            const breakfastTime = fmtMins(RACE_START_MINS - 165); // 2hr45 before
            const preRaceSnackTime = fmtMins(RACE_START_MINS - 45);
            const finishTime = fmtMins(RACE_START_MINS + totalRaceMinutes);

            // Pre-race meal carbs: 2–4g/kg (Burke 2011) — use 3g/kg
            const preRaceCarbs = kg ? Math.round(3*kg) : "—";
            const preRaceKcal  = kg ? Math.round(preRaceCarbs*4 + 0.25*kg*4 + 0.2*kg*9) : "—";

            // Immediate recovery (30min post): 1.2g/kg carbs + 0.4g/kg protein
            const immCarbs   = kg ? Math.round(1.2*kg) : "—";
            const immProtein = kg ? Math.round(0.4*kg) : "—";
            const immKcal    = kg ? Math.round(immCarbs*4+immProtein*4) : "—";

            // Hydration: 500–600ml/hr during, 150% sweat loss after
            const duringFluid = Math.round(hrs * 550);
            const postFluid   = kg ? Math.round(SWEAT[sweatKey].hydFn(kg,"long",totalRaceMinutes)*1.5) : "—";

            const ACCENT="#f59e0b";
            const ACCENT_DIM="#78350f";
            const CARD="#0c1420";
            const INNER="#080f1a";
            const BORDER="#1e293b";

            // Timeline steps
            const timeline=[
              {time:fmtMins(RACE_START_MINS-480), emoji:"⏰", label:"Wake up",
               detail:"Aim for 3 hours before your wave start. Eat within 30 minutes of waking.",
               color:"#94a3b8"},
              {time:breakfastTime, emoji:"🌾", label:"Pre-race breakfast",
               detail:`${kg?preRaceCarbs+"g carbs, "+Math.round(0.25*kg)+"g protein — ":""}porridge, bagels, or rice. Low fibre, no new foods. Your most important meal of the day.`,
               color:ACCENT,
               note:`~${preRaceKcal} kcal` + (kg?` / ${Math.round(preRaceKcal*4.184).toLocaleString()} kJ`:"")},
              {time:fmtMins(RACE_START_MINS-90), emoji:"💧", label:"Begin pre-loading",
               detail:"Sip 500–600ml of water or electrolyte drink over the next 90 min. Don't gulp — steady intake.",
               color:"#60a5fa"},
              {time:preRaceSnackTime, emoji:"🍌", label:"Pre-race snack",
               detail:"Banana + energy gel. Tops up blood glucose right before the gun. Easy to eat at bag drop.",
               color:ACCENT,
               note:"~200 kcal"},
              {time:fmtMins(RACE_START_MINS-15), emoji:"💊", label:"Final electrolyte dose",
               detail:"Take an electrolyte tablet with 200ml water. Last chance before the start corral.",
               color:"#60a5fa"},
              {time:fmtMins(RACE_START_MINS), emoji:"🏁", label:"Race start — 9:00 AM",
               detail:"Your glycogen stores are full. Stick to the plan — don't go out too hard.",
               color:"#4ade80",
               highlight:true},
              {time:fmtMins(RACE_START_MINS+45), emoji:"🟡", label:"First gel",
               detail:"Take your first gel at 45 min — before you feel you need it. With 150–200ml water, not sports drink. Only use a gel brand and timing you have practiced on long runs.",
               color:ACCENT},
              ...gelTimes.slice(1).map((t,i)=>({
                time:fmtMins(RACE_START_MINS+t), emoji:"🟡",
                label:`Gel ${i+2} · km ${Math.round(t/totalRaceMinutes*42.2)}`,
                detail:`Every ~${gelIntervalMins} min. ${carbsPerHr}g carbs/hr target. Wash down with water, not sports drink.`,
                color:ACCENT,
              })),
              {time:fmtMins(RACE_START_MINS+totalRaceMinutes-20), emoji:"⚡", label:"Final push",
               detail:"Last 20 min: no more gels needed. Focus on pace and form. Draw on your training.",
               color:"#f87171"},
              {time:finishTime, emoji:"🎉", label:`Finish line — ${targetTime}`,
               detail:"Stop your watch. Collect your medal. Start recovering immediately.",
               color:"#4ade80",
               highlight:true},
              {time:fmtMins(RACE_START_MINS+totalRaceMinutes+20), emoji:"🔋", label:"Immediate recovery (within 20 min)",
               detail:`${kg?immCarbs+"g carbs + "+immProtein+"g protein — ":""}chocolate milk, recovery shake, or banana + yogurt. This window is critical for glycogen resynthesis.`,
               color:"#4ade80",
               note:`~${immKcal} kcal`},
              {time:fmtMins(RACE_START_MINS+totalRaceMinutes+120), emoji:"🍽️", label:"Full recovery meal (2 hrs post)",
               detail:`${kg?Math.round(1.2*kg)+"g carbs + "+Math.round(0.4*kg)+"g protein. ":""}Pasta, rice, chicken, salmon. Prioritise anti-inflammatory foods: berries, leafy greens, omega-3s.`,
               color:"#a78bfa"},
            ];

            return(
              <div style={{animation:"fi .4s ease"}}>

                {/* ── Target time + open/close toggle ── */}
                <div style={{background:`linear-gradient(135deg,#1a0f00,#0c0a00)`,border:`1px solid ${ACCENT}40`,borderRadius:14,padding:"16px 20px",marginBottom:16,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
                  <div style={{fontSize:28}}>🏁</div>
                  <div style={{flex:1,minWidth:200}}>
                    {isRaceDay
                      ? <div style={{fontFamily:bebas,fontSize:20,color:ACCENT,letterSpacing:"0.06em"}}>TODAY IS RACE DAY — GOOD LUCK! 🎉</div>
                      : <div style={{fontFamily:bebas,fontSize:18,color:"#f8fafc",letterSpacing:"0.04em"}}>{daysToRace} DAYS TO RACE</div>
                    }
                    <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Set your target finish time to personalise gel timing and fuelling windows</div>
                  </div>
                  {/* Target time input */}
                  <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                    <span style={{fontSize:11,fontFamily:mono,color:"#475569"}}>TARGET</span>
                    <input type="text" value={targetTime} onChange={e=>setTargetTime(e.target.value)}
                      placeholder="3:30"
                      style={{width:68,background:INNER,border:`1px solid ${ACCENT}60`,borderRadius:8,padding:"8px 10px",color:"#f8fafc",fontSize:16,fontFamily:mono,outline:"none",textAlign:"center"}}/>
                    <span style={{fontSize:11,fontFamily:mono,color:"#475569"}}>h:mm</span>
                  </div>
                  <button onClick={()=>setRdOpen(x=>!x)}
                    style={{padding:"9px 18px",borderRadius:8,border:`1px solid ${ACCENT}50`,background:rdOpen?`${ACCENT}18`:INNER,color:rdOpen?ACCENT:"#64748b",fontSize:12,fontFamily:mono,fontWeight:700,cursor:"pointer",transition:"all .2s",flexShrink:0,letterSpacing:"0.06em"}}>
                    {rdOpen?"▲ CLOSE":"▼ OPEN PLAN"}
                  </button>
                </div>

                {rdOpen&&(
                <div style={{animation:"fi .3s ease"}}>

                  {/* ── Key numbers strip ── */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:16}}>
                    {[
                      {label:"TARGET TIME",  value:targetTime,     unit:"",       color:ACCENT},
                      {label:"TOTAL GELS",   value:totalGels,      unit:"gels",   color:"#f97316"},
                      {label:"IN-RUN CARBS", value:totalInRunCarbs,unit:"g",      color:"#fbbf24"},
                      {label:"GEL INTERVAL", value:`${gelIntervalMins}`,unit:"min", color:"#fb923c"},
                      {label:"DURING FLUIDS",value:`${duringFluid}`, unit:"ml",   color:"#60a5fa"},
                      {label:"POST FLUIDS",  value:typeof postFluid==="number"?postFluid:"—",unit:"ml",color:"#38bdf8"},
                    ].map(({label,value,unit,color})=>(
                      <div key={label} style={{background:INNER,borderRadius:10,padding:"10px 12px",border:`1px solid ${color}20`}}>
                        <div style={{fontSize:9,fontFamily:mono,color:"#475569",letterSpacing:"0.1em",marginBottom:4}}>{label}</div>
                        <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                          <span style={{fontSize:20,fontWeight:700,fontFamily:mono,color,lineHeight:1}}>{value}</span>
                          {unit&&<span style={{fontSize:10,color:"#475569",fontFamily:mono}}>{unit}</span>}
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* ── Tab bar ── */}
                  <div style={{background:INNER,border:`1px solid ${BORDER}`,borderRadius:"10px 10px 0 0",padding:"8px 12px",display:"flex",gap:4,overflowX:"auto",WebkitOverflowScrolling:"touch",marginBottom:0}}>
                    {[["timeline","⏱ Timeline"],["gels","🟡 Gel Plan"],["morning","🌅 Race Morning"],["recovery","💪 Recovery"],["bonk","🧮 Bonk Check"]].map(([id,label])=>(
                      <button key={id} onClick={()=>setRdTab(id)}
                        style={{padding:"7px 14px",borderRadius:7,border:"none",background:rdTab===id?"#1e293b":"transparent",color:rdTab===id?"#f8fafc":"#475569",fontSize:12,fontWeight:rdTab===id?600:400,cursor:"pointer",transition:"all .15s",whiteSpace:"nowrap",flexShrink:0}}>
                        {label}
                      </button>
                    ))}
                  </div>

                  {/* ══ TIMELINE TAB ══════════════════════════════════════════ */}
                  {rdTab==="timeline"&&(
                    <div style={{background:CARD,border:`1px solid ${BORDER}`,borderTop:`2px solid ${ACCENT}`,padding:"20px",animation:"fi .3s ease"}}>
                      <div style={{fontSize:11,fontFamily:mono,color:"#475569",letterSpacing:"0.1em",marginBottom:16}}>
                        RACE DAY TIMELINE · TARGET {targetTime} · ESTIMATED FINISH {finishTime}
                      </div>
                      <div style={{position:"relative"}}>
                        {/* Vertical line */}
                        <div style={{position:"absolute",left:20,top:0,bottom:0,width:2,background:"#0f172a",borderRadius:1}}/>
                        <div style={{display:"flex",flexDirection:"column",gap:0}}>
                          {timeline.map((step,i)=>(
                            <div key={i} style={{display:"flex",gap:12,paddingBottom:step.highlight?20:14,position:"relative"}}>
                              {/* Dot on timeline */}
                              <div style={{width:42,flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",paddingTop:2}}>
                                <div style={{width:12,height:12,borderRadius:"50%",background:step.highlight?"#f8fafc":step.color,border:`2px solid ${step.color}`,flexShrink:0,zIndex:1,marginBottom:2,boxShadow:step.highlight?`0 0 0 3px ${step.color}30`:"none"}}/>
                                <span style={{fontSize:9,fontFamily:mono,color:"#334155",textAlign:"center",lineHeight:1.2}}>{step.time}</span>
                              </div>
                              {/* Content */}
                              <div style={{flex:1,background:step.highlight?`${step.color}10`:INNER,border:`1px solid ${step.highlight?step.color+"40":BORDER}`,borderRadius:10,padding:"10px 14px",marginBottom:2}}>
                                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                                  <span style={{fontSize:16}}>{step.emoji}</span>
                                  <span style={{fontSize:13,fontWeight:700,color:step.highlight?"#f8fafc":step.color}}>{step.label}</span>
                                  {step.note&&<span style={{fontSize:10,fontFamily:mono,color:"#475569",marginLeft:"auto"}}>{step.note}</span>}
                                </div>
                                <p style={{fontSize:12,color:"#64748b",lineHeight:1.6,margin:0}}>{step.detail}</p>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}

                  {/* ══ GEL PLAN TAB ══════════════════════════════════════════ */}
                  {rdTab==="gels"&&(

                      <div style={{fontSize:11,fontFamily:mono,color:"#475569",letterSpacing:"0.1em",marginBottom:16}}>IN-RUN FUELLING PLAN · {carbsPerHrLow}–{carbsPerHrHigh}G CARBS/HR · SCHEDULE AT {carbsPerHr}G/HR BASE</div>

                      {/* Science note */}
                      <div style={{background:INNER,borderRadius:10,padding:"12px 16px",marginBottom:16,border:`1px solid ${ACCENT}20`}}>
                        <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.8}}>
                          <p style={{marginBottom:10}}>
                            <strong style={{color:ACCENT}}>Why 60g/hr is the floor, not the ceiling. </strong>
                            The 60g/hr limit applies only to single-source glucose gels. Your gut uses the SGLT1 transporter to absorb glucose — and it saturates at around 60g/hr no matter how many gels you take. But fructose uses an entirely different transporter, GLUT5. Combining glucose and fructose in the same gel opens both "lanes" simultaneously, raising absorption to 90g/hr — with up to 75% higher oxidation rates than glucose alone (Jeukendrup, 2008; Jeukendrup, 2014).

                              : "Your target is under 2.5 hours. At this duration, 60g/hr with either single or multi-transporter gels is evidence-based and appropriate (Jeukendrup 2014)."}
                          </p>
                          <p style={{margin:0}}>
                            <strong style={{color:"#f87171"}}>Important: </strong>
                            Start fuelling at 45 min — well before you feel you need it. Glycogen stores last ~90 min at marathon pace. Once you're behind on fuel, you cannot catch up.

                            {brand:"Maurten Gel 100",carbs:"25g",kcal:100,transporter:"multi",notes:"Hydrogel technology. Glucose+fructose 0.8:1. Mildest on the gut of any gel tested.",badge:"GI-FRIENDLY"},
                            {brand:"Maurten Gel 100 CAF",carbs:"25g",kcal:100,transporter:"multi",notes:"100mg caffeine. Identical formula to non-caf. Save 1–2 for km 30–38.",badge:"CAFFEINE BOOST"},

                            <br/><br/>

                          <div style={{fontSize:9,fontFamily:mono,color:"#475569",letterSpacing:"0.1em",marginBottom:6}}>CARBS / HR</div>
                          <div style={{display:"flex",gap:5,alignItems:"center"}}>
                            <input type="number" min="0" max="120" value={bonkCarbs} onChange={e=>setBonkCarbs(e.target.value)}
                              style={{flex:1,background:"#040a0f",border:"1px solid #1e293b",borderRadius:6,padding:"7px 8px",color:"#f8fafc",fontSize:15,fontFamily:mono,outline:"none",minWidth:0}}/>
                            <span style={{fontSize:11,color:"#475569",fontFamily:mono,flexShrink:0}}>g/hr</span>
                          </div>
                        </div>
                      </div>

                      {/* Experience picker — compact radio style */}
                      <div style={{marginBottom:14}}>
                        <div style={{fontSize:9,fontFamily:mono,color:"#475569",letterSpacing:"0.1em",marginBottom:8}}>YOUR MARATHON EXPERIENCE <span style={{color:"#334155"}}>(sets starting glycogen)</span></div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:6}}>
                          {[
                            {id:"first",   label:"First marathon",      glycogen:200, color:"#f87171"},
                            {id:"some",    label:"A few under my belt", glycogen:260, color:"#f59e0b"},
                            {id:"trained", label:"Experienced",         glycogen:300, color:"#4ade80"},
                            {id:"loaded",  label:"Carb-loaded & trained",glycogen:360,color:"#60a5fa"},
                          ].map(({id,label,glycogen,color})=>(
                            <button key={id} onClick={()=>{setBonkExp(id);setBonkGlycogen(String(glycogen));}}
                              style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,
                                border:`1px solid ${bonkExp===id?color:"#1e293b"}`,
                                background:bonkExp===id?`${color}12`:"#040a0f",
                                cursor:"pointer",textAlign:"left",transition:"all .15s",width:"100%"}}>
                              <div style={{width:8,height:8,borderRadius:"50%",border:`2px solid ${color}`,background:bonkExp===id?color:"transparent",flexShrink:0,transition:"all .15s"}}/>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:11,fontWeight:600,color:bonkExp===id?"#f8fafc":"#64748b",lineHeight:1.3}}>{label}</div>
                                <div style={{fontSize:9,fontFamily:mono,color:bonkExp===id?color:"#334155"}}>~{glycogen}g glycogen</div>
                              </div>
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* ── Inline calculation ── */}
                      {(()=>{
                        const bwt    = Math.max(30,parseFloat(bonkWeight)||70);
                        const bcarbs = Math.max(0, parseFloat(bonkCarbs)||0);
                        const bglyc  = Math.max(100,parseFloat(bonkGlycogen)||200);
                        const parseBT=(s)=>{const p=(s||"3:30").split(":").map(Number);return(p.length===2&&!isNaN(p[0])&&!isNaN(p[1]))?(p[0]+p[1]/60):3.5;};
                        const raceHrs=Math.max(0.5,parseBT(bonkTime));
                        const carbBurnPerHr   =bwt*0.9;
                        const usableCarbsPerHr=bcarbs*0.85;
                        const totalBurn       =carbBurnPerHr*raceHrs;
                        const totalConsumed   =usableCarbsPerHr*raceHrs;
                        const remaining       =Math.round(bglyc+totalConsumed-totalBurn);
                        const recCarbsPerHr   =Math.round(carbBurnPerHr*0.9);
                        const gapGhr          =Math.max(0,recCarbsPerHr-bcarbs);
                        const extraGels       =gapGhr>0?Math.ceil(gapGhr/21.25):0;
                        const gelEveryMins    =extraGels>0?Math.round(60/extraGels):null;
                        const risk=remaining>150?"low":remaining>=50?"moderate":"high";
                        const RC={low:"#4ade80",moderate:"#f59e0b",high:"#f87171"};
                        const RBG={low:"#091a10",moderate:"#1a0f00",high:"#1a0505"};
                        const RBD={low:"#4ade8030",moderate:"#f59e0b30",high:"#f8717130"};
                        const RL={low:"LOW BONK RISK",moderate:"MODERATE BONK RISK",high:"HIGH BONK RISK"};
                        const RE={low:"✅",moderate:"⚠️",high:"🔴"};
                        const RT={
                          low:`~${remaining}g glycogen remaining at finish — above the depletion threshold. On track. Practice this intake on long runs to confirm your gut handles it.`,
                          moderate:`~${Math.max(0,remaining)}g remaining at the finish. Expect fatigue and pace loss in the final 8–10km. Add ~${Math.round(gapGhr)}g/hr (about ${extraGels===1?"one extra gel":"an extra gel"} every ${gelEveryMins||45} min).`,
                          high:`Glycogen ${remaining<0?"runs out ~"+Math.round(Math.abs(remaining)/carbBurnPerHr*60)+" min before the finish":"critically low at the line"}. High likelihood of hitting the wall. Add ${extraGels} gel${extraGels!==1?"s":""} per hour.`,
                        };
                        const hrs2=Math.floor(raceHrs),mins2=Math.round((raceHrs-hrs2)*60);
                        const shareText=`My marathon fuelling strategy has a ${RL[risk]}.

Weight: ${bwt}kg | Goal: ${hrs2}:${String(mins2).padStart(2,"0")} | Fuelling: ${bcarbs}g carbs/hr
Est. glycogen at finish: ${Math.max(0,remaining)}g

Check yours → https://marathon-fuel.app`;
                        return(
                          <div style={{animation:"fi .2s ease"}}>

                            {/* Stats mini-strip */}
                            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:6,marginBottom:12}}>
                              {[
                                {l:"BURN RATE",   v:Math.round(carbBurnPerHr),   u:"g/hr",col:"#f87171"},
                                {l:"USABLE/HR",   v:Math.round(usableCarbsPerHr),u:"g/hr",col:"#60a5fa"},
                                {l:"TOTAL BURNED",v:Math.round(totalBurn),       u:"g",   col:"#f87171"},
                                {l:"ABSORBED",    v:Math.round(totalConsumed),   u:"g",   col:"#60a5fa"},
                                {l:"STORES",      v:bglyc,                       u:"g",   col:"#a78bfa"},
                                {l:"AT FINISH",   v:Math.max(0,remaining),       u:"g",   col:RC[risk]},
                              ].map(({l,v,u,col})=>(
                                <div key={l} style={{background:"#080f1a",borderRadius:7,padding:"8px 10px",border:"1px solid #0f172a"}}>
                                  <div style={{fontSize:8,fontFamily:mono,color:"#334155",letterSpacing:"0.06em",marginBottom:3,lineHeight:1.2}}>{l}</div>
                                  <div style={{display:"flex",alignItems:"baseline",gap:2}}>
                                    <span style={{fontSize:16,fontWeight:700,fontFamily:mono,color:col,lineHeight:1}}>{v}</span>
                                    <span style={{fontSize:9,color:"#475569",fontFamily:mono}}>{u}</span>
                                  </div>
                                </div>
                              ))}
                            </div>

                            {/* Risk card */}
                            <div style={{background:RBG[risk],border:`1px solid ${RBD[risk]}`,borderRadius:12,padding:"16px 18px",marginBottom:12}}>
                              <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:12,flexWrap:"wrap"}}>
                                <span style={{fontSize:26,lineHeight:1}}>{RE[risk]}</span>
                                <div style={{flex:1,minWidth:120}}>
                                  <div style={{fontSize:9,fontFamily:mono,color:"#475569",letterSpacing:"0.1em",marginBottom:3}}>BONK RISK</div>
                                  <div style={{fontFamily:bebas,fontSize:"clamp(18px,4vw,24px)",color:RC[risk],letterSpacing:"0.06em",lineHeight:1}}>{RL[risk]}</div>
                                </div>
                                <div style={{background:"#080f1a",borderRadius:7,padding:"6px 12px",border:`1px solid ${RC[risk]}20`,textAlign:"center",flexShrink:0}}>
                                  <div style={{fontSize:8,fontFamily:mono,color:"#475569",marginBottom:1}}>GLYCOGEN AT FINISH</div>
                                  <div style={{fontFamily:mono,fontSize:18,fontWeight:700,color:RC[risk],lineHeight:1}}>{Math.max(0,remaining)}g</div>
                                  {remaining<0&&<div style={{fontSize:8,fontFamily:mono,color:"#f87171",marginTop:1}}>depleted early</div>}
                                </div>
                              </div>

                              {/* Segment bar */}
                              <div style={{display:"flex",gap:3,marginBottom:6}}>
                                {[{id:"low",col:"#4ade80",bg:"#091a10"},{id:"moderate",col:"#f59e0b",bg:"#1a0f00"},{id:"high",col:"#f87171",bg:"#1a0505"}].map(({id,col,bg})=>(
                                  <div key={id} style={{flex:1,padding:"5px 0",borderRadius:5,background:risk===id?col:bg,border:`1px solid ${col}${risk===id?"":"20"}`,textAlign:"center",transition:"all .3s"}}>
                                    <span style={{fontSize:8,fontFamily:mono,fontWeight:700,color:risk===id?"#040a0f":col,letterSpacing:"0.06em"}}>{id.toUpperCase()}</span>
                                  </div>
                                ))}
                              </div>
                              <div style={{height:5,borderRadius:3,background:"#0f172a",overflow:"hidden",marginBottom:12}}>
                                <div style={{height:"100%",width:`${Math.max(2,Math.min(100,Math.round(Math.max(0,remaining)/600*100)))}%`,background:RC[risk],borderRadius:3,transition:"width .5s ease"}}/>
                              </div>

                              <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.65,margin:"0 0 10px"}}>{RT[risk]}</p>
                              <p style={{fontSize:10,color:"#334155",lineHeight:1.4,margin:0,fontStyle:"italic"}}>~{bglyc}g starting glycogen · 0.9g CHO/kg/hr burn rate · 85% absorption (Romijn 1993; Coyle 1986)</p>
                            </div>

                            {/* Recommendation */}
                            {bcarbs<recCarbsPerHr&&(
                              <div style={{background:"#150a0a",border:"1px solid #7f1d1d",borderRadius:10,padding:"12px 14px",marginBottom:12}}>
                                <div style={{fontSize:9,fontFamily:mono,color:"#f87171",marginBottom:4,letterSpacing:"0.08em"}}>💡 RECOMMENDATION — UNDER TARGET BY {Math.round(gapGhr)}g/hr</div>
                                <div style={{fontSize:12,color:"#fca5a5",lineHeight:1.6}}>Add <strong>{extraGels}</strong> gel{extraGels!==1?"s":""} per hour — one every <strong>{gelEveryMins||45} min</strong>. Recommended rate for your weight: <span style={{fontFamily:mono,color:"#f87171"}}>{recCarbsPerHr}g/hr</span>.</div>
                              </div>
                            )}
                            {bcarbs>=recCarbsPerHr&&(
                              <div style={{background:"#0d2318",border:"1px solid #166534",borderRadius:10,padding:"12px 14px",marginBottom:12}}>
                                <div style={{fontSize:9,fontFamily:mono,color:"#4ade80",marginBottom:3,letterSpacing:"0.08em"}}>✓ INTAKE AT OR ABOVE TARGET — {recCarbsPerHr}g/hr recommended</div>
                                <div style={{fontSize:12,color:"#86efac",lineHeight:1.5}}>Fuelling rate meets the evidence-based target. Focus on gut training and race day execution.</div>
                              </div>
                            )}

                            {/* Share */}
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
                              <div style={{fontSize:11,color:"#334155"}}>Share your result with your coach or on socials</div>
                              <button onClick={()=>{try{navigator.clipboard.writeText(shareText).then(()=>{setBonkShareCopied(true);setTimeout(()=>setBonkShareCopied(false),2500);});}catch{}}}
                                style={{padding:"8px 16px",borderRadius:7,border:`1px solid ${bonkShareCopied?"#4ade8055":"#1e293b"}`,background:bonkShareCopied?"#0d2318":"#080f1a",color:bonkShareCopied?"#4ade80":"#64748b",fontSize:11,fontFamily:mono,fontWeight:700,cursor:"pointer",transition:"all .2s",letterSpacing:"0.06em",flexShrink:0}}>
                                {bonkShareCopied?"✓ COPIED":"📤 SHARE RESULT"}
                              </button>
                            </div>

                          </div>
                        );
                      })()}
                    </div>
                  )}

                </div>
                )}
              </div>
            );
          })()}
        </div>


        {/* ═══════════════════════════════════════════════════════════════
            DOWNLOAD RACE FUEL PLAN — PNG (only shown when race date is set)
        ═══════════════════════════════════════════════════════════════ */}
        {raceDate&&(
          <div style={{marginTop:40,borderTop:"1px solid #0f172a",paddingTop:28,display:"flex",flexDirection:"column",alignItems:"center",gap:12,textAlign:"center"}}>
            <div style={{fontSize:11,fontFamily:mono,color:"#334155",letterSpacing:"0.12em"}}>SHARE YOUR RACE FUEL PLAN</div>
            <p style={{fontSize:13,color:"#475569",maxWidth:480,lineHeight:1.6,margin:0}}>
              Download a snapshot of this page as a PNG and share it with your coach, training partners, or social media.
            </p>
            <button
              id="png-download-btn"
              onClick={()=>{
                setPngLoading(true);
                const el=document.getElementById("root");
                window.html2canvas(el,{
                  backgroundColor:"#040a0f",
                  scale:1.5,
                  useCORS:true,
                  logging:false,
                  windowWidth:900,
                }).then(canvas=>{
                  const link=document.createElement("a");
                  link.download="marathon-fuel-plan.png";
                  link.href=canvas.toDataURL("image/png");
                  link.click();
                  setPngLoading(false);
                }).catch(()=>setPngLoading(false));
              }}
              style={{display:"inline-flex",alignItems:"center",gap:10,padding:"13px 28px",borderRadius:10,border:"1px solid #4ade8050",background:"linear-gradient(135deg,#0d2318,#091a10)",color:"#4ade80",fontSize:13,fontFamily:mono,fontWeight:700,cursor:"pointer",letterSpacing:"0.08em",transition:"all .2s",boxShadow:"0 0 20px #4ade8015"}}>
              {pngLoading
                ? <><span style={{display:"inline-block",width:14,height:14,border:"2px solid #4ade8040",borderTop:"2px solid #4ade80",borderRadius:"50%",animation:"pulse .8s linear infinite"}}/>GENERATING…</>
                : <>📸 Download Race Fuel Plan (PNG)</>}
            </button>
            <div style={{fontSize:11,color:"#1e293b",fontFamily:mono}}>High-res · instant · no account needed</div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
