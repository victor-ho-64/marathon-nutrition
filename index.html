// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
const TODAY=new Date();
const fmtToday=TODAY.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
function daysUntil(ds){const d=new Date(ds+"T00:00:00");return Math.ceil((d-TODAY)/86400000);}
function weeksUntil(ds){return Math.max(0,Math.floor(daysUntil(ds)/7));}

// ─── SESSIONS ─────────────────────────────────────────────────────────────────
const SESSIONS=[

const DEFAULT_DUR={easy:60,interval:45,tempo:55,midweek_long:90,long:150,rest:0};

// ─── CALCULATIONS ─────────────────────────────────────────────────────────────
const calcBurned=(met,kg,mins)=>{
  if(!kg||!mins)return null;
  const kcal=Math.round(met*kg*(mins/60));
  return{kcal,kj:Math.round(kcal*4.184)};
};
const REPLENISH_RATE={easy:.60,interval:.75,tempo:.70,midweek_long:.72,long:.75,rest:.40};
const calcReplenish=(burned,kg,sid)=>{
  if(!burned||!kg)return null;
  const rate=REPLENISH_RATE[sid]||.65;
  const kcal=Math.max(Math.round(burned.kcal*rate),200);
  return{kcal,kj:Math.round(kcal*4.184),rate};
};
const calcMacros=(kg,sid,mins,carbLoad)=>{
  if(!kg)return null;
  if(carbLoad){
    const c=Math.round(10*kg),p=Math.round(.25*kg),f=Math.round(.08*kg);
    const kcal=c*4+p*4+f*9;
    return{carbs:c,protein:p,fat:f,kcal,kj:Math.round(kcal*4.184)};
  }
  // Evidence base: ACSM/ISSN post-exercise recovery targets
  // Carbs: 1.0–1.2g/kg/hr depleted (ACSM 2016 Joint Position Statement; Thomas et al.)
  // Protein: 0.3g/kg per session (ISSN Nutrient Timing Position Stand; Kerksick et al. 2017)
  // Fat: 0.5–0.8g/kg/day maintenance; ~0.15–0.25g/kg per post-run window (ACSM)
  // Rest day: daily maintenance framing — moderate carbs, full protein, higher fat
  // Duration factor scales carbs only (longer run = more glycogen depleted)
  const base={
    easy:     {c:1.0, p:0.30, f:0.20}, // ~60min aerobic: 1.0g/kg carbs post-run
    interval: {c:1.2, p:0.30, f:0.15}, // high intensity: max 1.2g/kg carbs, lean on fat
    tempo:    {c:1.1, p:0.30, f:0.18}, // LT effort: between easy and interval
    midweek_long:{c:1.2,p:0.30,f:0.20},// moderate long: 1.2g/kg carbs
    long:     {c:1.2, p:0.30, f:0.20}, // long run: 1.2g/kg/hr × hrs depleted (df applied)
    rest:     {c:3.0, p:0.30, f:0.80}, // rest: daily maintenance, ~3g/kg carbs total day
  };
  const m=base[sid]||base.easy;
  // Duration factor: scales carbs for actual session length vs default
  // Only applied to run sessions (not rest). Long run gets strongest scaling.
  const df=sid==="rest"?1:mins?Math.max(0.7,Math.min(2.0,mins/(DEFAULT_DUR[sid]||60))):1;
  const carbs=Math.round(m.c*kg*df);
  const protein=Math.round(m.p*kg); // protein flat per kg — not duration-scaled
  const fat=Math.round(m.f*kg);     // fat flat per kg — not duration-scaled
  const kcal=carbs*4+protein*4+fat*9;
  return{carbs,protein,fat,kcal,kj:Math.round(kcal*4.184)};
};

function scaleIngredients(ingredients,kg){
  const ratio=kg?Math.max(.6,Math.min(2.0,kg/70)):1;
  return ingredients.map(ing=>{
    const r=ing.scale?ratio:1;
    let displayLabel,kcal=0;
    if(ing.unit==="g"||ing.unit==="ml"){
      const qty=Math.round(ing.base*r/5)*5;
      kcal=Math.round((qty/100)*(ing.kcalPer100||0));
      displayLabel=`${qty}${ing.unit} ${ing.label}`;
    } else if(ing.unit===""||ing.unit==="slices"){
      let count=ing.base;
      if(ing.scale&&ratio>1.2)count=Math.ceil(ing.base*ratio);
      if(ing.scale&&ratio<.8)count=Math.max(1,Math.floor(ing.base*ratio));
      const cs=count===.5?"½":count%1!==0?count.toFixed(1):String(count);
      kcal=Math.round(count*(ing.kcalEach||0));
      const us=ing.unit==="slices"?` ${ing.unit}`:"";
      displayLabel=`${cs}${us} ${ing.label}`;
    } else {
      const cs=ing.base===.5?"½":String(ing.base);
      displayLabel=`${cs} ${ing.unit} ${ing.label}`;
      kcal=Math.round((ing.kcalEach||0)*ing.base+(ing.kcalPer100||0)*ing.base/100);
    }
    return{displayLabel,kcal:kcal||0};
  });
}

const ReplenishCard=({burned,replenish,dishKcal,dishName,sessionColor,eu})=>{
  if(!burned||!replenish)return null;
  const pct=dishKcal?Math.min(100,Math.round((dishKcal/replenish.kcal)*100)):0;
  const barColor=pct>=85?"#4ade80":pct>=60?"#f59e0b":"#f87171";
  const showKcal=eu==="kcal"||eu==="both";
  const showKj=eu==="kj"||eu==="both";
  const fmt=(kcal)=>showKcal&&showKj?`${kcal.toLocaleString()} kcal / ${Math.round(kcal*4.184).toLocaleString()} kJ`:showKj?`${Math.round(kcal*4.184).toLocaleString()} kJ`:`${kcal.toLocaleString()} kcal`;
  return(
    <div style={{background:`${sessionColor||"#4ade80"}0a`,border:`1px solid ${sessionColor||"#4ade80"}25`,borderRadius:12,padding:"16px 20px",animation:"fi .4s ease"}}>
      <div style={{fontSize:11,fontFamily:mono,color:sessionColor||"#4ade80",letterSpacing:"0.12em",marginBottom:14}}>🔁 REPLENISHMENT TARGET</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
        {[{label:"BURNED",kcal:burned.kcal,color:"#f87171",note:"this session"},{label:"REPLENISH",kcal:replenish.kcal,color:sessionColor||"#4ade80",note:`${Math.round(replenish.rate*100)}% of burn`},{label:"THIS DISH",kcal:dishKcal||null,color:"#60a5fa",note:dishName||"select meal"}].map(({label,kcal,color,note})=>(
          <div key={label} style={{background:"#080f1a",borderRadius:10,padding:"12px 14px",border:"1px solid #0f172a"}}>
            <div style={{fontSize:9,fontFamily:mono,color:"#475569",letterSpacing:"0.1em",marginBottom:6}}>{label}</div>
            {kcal?(
              <>
                {showKcal&&<div style={{fontSize:18,fontWeight:700,color,fontFamily:mono,lineHeight:1}}>{kcal.toLocaleString()}</div>}
                {showKcal&&<div style={{fontSize:9,fontFamily:mono,color:"#334155",marginBottom:showKj?3:0}}>kcal</div>}
                {showKj&&<div style={{fontSize:showKcal?14:18,fontWeight:showKcal?500:700,color:showKcal?"#64748b":color,fontFamily:mono,lineHeight:1}}>{Math.round(kcal*4.184).toLocaleString()}</div>}
                {showKj&&<div style={{fontSize:9,fontFamily:mono,color:"#334155"}}>kJ</div>}
              </>
            ):(
              <div style={{fontSize:18,fontWeight:700,color:"#334155",fontFamily:mono}}>—</div>
            )}
            <div style={{fontSize:10,color:"#334155",marginTop:5}}>{note}</div>
          </div>
        ))}
      </div>
      {dishKcal&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,flexWrap:"wrap",gap:4}}>
            <span style={{fontSize:12,color:"#64748b"}}>Dish covers <strong style={{color:barColor}}>{pct}%</strong> of your replenishment target</span>
            {pct<100&&<span style={{fontSize:12,color:"#475569"}}>+{fmt(replenish.kcal-dishKcal)} still needed</span>}
          </div>
          <div style={{height:8,borderRadius:4,background:"#0f172a",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:barColor,borderRadius:4,transition:"width .6s ease"}}/>

          </div>
        </div>
      )}
    </div>

};

                ))}
              </div>
            </div>
          </div>

          {/* Sweat profile */}
          <div style={{background:"#0c1420",border:"1px solid #1e293b",borderRadius:14,padding:20}}>
            <div style={{fontSize:11,fontFamily:mono,color:"#475569",letterSpacing:"0.12em",marginBottom:12}}>SWEAT / CRAMP PROFILE</div>

                    <span style={{fontSize:14}}>{p.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:sweatKey===key?p.color:"#cbd5e1"}}>{p.label}</div>

          <div style={{background:"#0c1420",border:"1px solid #1e293b",borderRadius:14,padding:20}}>

            <input type="date" value={raceDate} onChange={e=>setRaceDate(e.target.value)}
              style={{width:"100%",background:"#080f1a",border:"1px solid #1e293b",borderRadius:8,padding:"10px 14px",color:raceDate?"#f8fafc":"#475569",fontSize:14,fontFamily:mono,outline:"none"}}/>
            {raceDate&&weeksOut!==null&&(
              <div style={{marginTop:10,padding:"8px 12px",background:carbLoadUnlocked?"#0d2318":"#0c1420",border:`1px solid ${carbLoadUnlocked?"#4ade80":"#1e293b"}`,borderRadius:8}}>

                  ? <div style={{fontSize:12,color:"#4ade80",fontFamily:mono}}>🏅 {weeksOut===0?"Race day!":weeksOut===1?"Race next week — carb load now!":""+daysUntil(raceDate)+" days to go — Carb Load Mode unlocked ↓"}</div>
                  : <div style={{fontSize:12,color:"#475569",fontFamily:mono}}>{daysUntil(raceDate)} days to go · {weeksOut} weeks · Carb Load unlocks at 7 days</div>
                }
              </div>

          </div>
        </div>

        {/* ── SESSION PICKER ── */}
        {!carbLoad&&(
          <div style={{marginBottom:16}}>

            {/* Button strip */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>

                <button key={s.id} onClick={()=>setSelected(s.id===selected?null:s.id)}
                  style={{cursor:"pointer",display:"flex",alignItems:"center",gap:7,padding:"9px 14px",borderRadius:10,border:"1px solid",borderColor:selected===s.id?s.color:"#1e293b",background:selected===s.id?`${s.color}14`:"#0c1420",color:selected===s.id?s.color:"#64748b",fontSize:13,fontWeight:selected===s.id?700:400,transition:"all .18s",flexShrink:0}}>

            {/* Expanded detail card for selected session — includes duration slider */}
            {selected&&sess&&(
              <div style={{border:"1px solid",borderColor:sess.color,borderRadius:12,background:"#0c1420",animation:"fi .2s ease",position:"relative",overflow:"hidden"}}>

                      <div style={{fontSize:12,color:"#64748b"}}>{sess.description}</div>
                    </div>

                  {/* Duration slider — only for non-rest sessions */}

                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <input type="number" min="10" max="300" value={durations[sess.id]||DEFAULT_DUR[sess.id]}

                        </div>
                      </div>

                          background:`linear-gradient(to right,${sess.color} ${Math.round(((durations[sess.id]||DEFAULT_DUR[sess.id])-10)/(240-10)*100)}%,#1e293b ${Math.round(((durations[sess.id]||DEFAULT_DUR[sess.id])-10)/(240-10)*100)}%)`}}/>

                      </div>

                        <div style={{fontSize:15,fontWeight:700,fontFamily:mono,color}}>{value}</div>
                      </div>
                    ))}

                  </div>

          <div style={{animation:"fi .4s ease",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:12,marginBottom:12}}>

                    <div style={{fontSize:9,fontFamily:mono,color:"#475569",marginBottom:2}}>kcal</div>
                    <div style={{fontSize:20,fontWeight:700,color:sess?.color||"#60a5fa",fontFamily:mono}}>{macros.kcal.toLocaleString()}</div>
                  </div>}
                  {showKj&&<div style={{background:"#080f1a",borderRadius:8,padding:"8px 12px",minWidth:80}}>
                    <div style={{fontSize:9,fontFamily:mono,color:"#475569",marginBottom:2}}>kJ</div>
                    <div style={{fontSize:20,fontWeight:700,color:"#a78bfa",fontFamily:mono}}>{macros.kj.toLocaleString()}</div>
                  </div>}
                  <div style={{background:"#080f1a",borderRadius:8,padding:"8px 12px",flex:1,minWidth:160}}>
                    <div style={{fontSize:9,fontFamily:mono,color:"#4ade80",marginBottom:4,letterSpacing:"0.08em"}}>PER KG BREAKDOWN</div>
                    <div style={{fontSize:11,color:"#64748b"}}>
                      <span style={{color:"#4ade80"}}>{(macros.carbs/kg).toFixed(1)}g/kg</span> carbs · <span style={{color:"#f59e0b"}}>{(macros.protein/kg).toFixed(2)}g/kg</span> protein · <span style={{color:"#60a5fa"}}>{(macros.fat/kg).toFixed(2)}g/kg</span> fat
                    </div>
                  </div>
                </div>
                {showEvidence&&(
                  <div style={{marginTop:14,borderTop:"1px solid #0f172a",paddingTop:14,animation:"fi .2s ease"}}>
                    <div style={{fontSize:10,fontFamily:mono,color:"#a78bfa",letterSpacing:"0.1em",marginBottom:10}}>📚 EVIDENCE BASE</div>
                    {[
                      {label:"Carbohydrates",color:"#4ade80",value:selected==="rest"?"3g/kg/day maintenance":"1.0–1.2g/kg post-exercise",source:"ACSM Joint Position Statement (Thomas et al., 2016). Med Sci Sports Exerc 48(3):543–68.",detail:selected==="rest"?"On rest days, carbohydrate intake of ~3g/kg/day maintains glycogen without excess. ACSM recommends 5–7g/kg/day total for moderate training — this target represents the post-session/day-off portion.":"Optimal glycogen resynthesis requires 1.0–1.2g carbohydrate/kg/hour in the 4–6hr post-exercise window. Harder sessions (interval, tempo) warrant the full 1.2g/kg. Easy runs tolerate 1.0g/kg."},
                      {label:"Protein",color:"#f59e0b",value:"0.3g/kg per session",source:"ISSN Nutrient Timing Position Stand (Kerksick et al., 2017). J Int Soc Sports Nutr 14:33.",detail:"0.3g/kg of high-quality protein post-exercise maximally stimulates muscle protein synthesis. This threshold is consistent across endurance and strength modalities. Distribution across 4–5 meals is recommended for total daily protein of 1.4–1.7g/kg/day for endurance athletes."},
                      {label:"Fat",color:"#60a5fa",value:"0.15–0.25g/kg post-run",source:"ACSM/AND/DC Joint Position (Rodriguez et al., 2009). J Am Diet Assoc 109(3):509–27.",detail:"Fat intake is not prioritised in the immediate post-run window as it slows gastric emptying and may impair carbohydrate absorption. However, total daily fat should be 0.5–1.0g/kg/day to provide essential fatty acids and fat-soluble vitamins. This target reflects ~20–30% of daily fat needs in one recovery meal."},
                    ].map(({label,color,value,source,detail})=>(
                      <div key={label} style={{marginBottom:12,background:"#080f1a",borderRadius:10,padding:"12px 14px",border:`1px solid ${color}20`}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                          <div style={{width:8,height:8,borderRadius:"50%",background:color}}/>
                          <span style={{fontSize:11,fontWeight:700,color}}>{label}</span>
                          <span style={{fontSize:10,fontFamily:mono,color:"#475569",marginLeft:"auto"}}>{value}</span>
                        </div>
                        <p style={{fontSize:12,color:"#64748b",lineHeight:1.6,marginBottom:6}}>{detail}</p>
                        <div style={{fontSize:10,color:"#334155",fontStyle:"italic",lineHeight:1.4}}>📄 {source}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
            {burned&&!carbLoad&&(
              <div style={{background:"#0c1420",border:"1px solid #1e293b",borderRadius:12,padding:"16px 20px"}}>
                <div style={{fontSize:11,fontFamily:mono,color:"#475569",letterSpacing:"0.12em",marginBottom:10}}>ESTIMATED BURN · {dur} min</div>
                <div style={{display:"flex",gap:8}}>
                  {showKcal&&<div style={{background:"#080f1a",borderRadius:8,padding:"8px 12px",minWidth:80}}>
                    <div style={{fontSize:9,fontFamily:mono,color:"#475569",marginBottom:2}}>kcal</div>
                    <div style={{fontSize:20,fontWeight:700,color:sess?.color,fontFamily:mono}}>{burned.kcal.toLocaleString()}</div>
                  </div>}
                  {showKj&&<div style={{background:"#080f1a",borderRadius:8,padding:"8px 12px",minWidth:80}}>
                    <div style={{fontSize:9,fontFamily:mono,color:"#475569",marginBottom:2}}>kJ</div>
                    <div style={{fontSize:20,fontWeight:700,color:"#a78bfa",fontFamily:mono}}>{burned.kj.toLocaleString()}</div>
                  </div>}
                </div>
                <div style={{marginTop:10,fontSize:12,color:"#475569",lineHeight:1.5}}>MET-based estimate. Varies ±15% with fitness, terrain, conditions.</div>
              </div>
            )}
            {hydration&&(
              <div style={{background:`${prof.color}0d`,border:`1px solid ${prof.color}25`,borderRadius:12,padding:"16px 20px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{fontSize:16}}>{prof.icon}</span>
                  <span style={{fontSize:11,fontFamily:mono,color:prof.color,letterSpacing:"0.1em"}}>HYDRATION TARGET</span>

          </div>

        {/* ── REPLENISHMENT CARD ── */}
        {burned&&replenish&&(
          <div style={{marginBottom:12}}>
            <ReplenishCard burned={burned} replenish={replenish} dishKcal={dishKcal} dishName={meals[activeMeal]?.name} sessionColor={sess?.color} eu={eu}/>

        {/* ── MEALS PANEL ── */}
        {selected&&meals.length>0&&(
          <div style={{animation:"fi .4s ease"}}>

            <div style={{background:"#0c1420",border:"1px solid #1e293b",borderRadius:"12px 12px 0 0",borderBottom:"none",padding:"14px 18px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <span style={{fontSize:24}}>{sess?.icon}</span>
              <div>
                <div style={{fontFamily:bebas,fontSize:18,letterSpacing:"0.06em",color:"#f8fafc"}}>
                  {sess?.label.toUpperCase()+" — TODAY'S NUTRITION"}
                </div>
                <div style={{fontSize:11,color:sess?.color,fontFamily:mono}}>Post-run: {TIMING[selected]}</div>
              </div>
            </div>

            {/* Tab bar: Pre-Run first, then Post-Run */}
            <div style={{background:"#080f1a",borderLeft:"1px solid #1e293b",borderRight:"1px solid #1e293b",padding:"8px 14px",display:"flex",gap:4,flexWrap:"wrap"}}>
              {[
                ...([["pre-run",`⚡ Before ${sess?.label}`]]),
                ["post-run","🍽️ After Run"],
                ["hydration","💧 Hydration"],
                ["tips","💡 Tips & Avoid"],
              ].map(([v,l])=>(
                <button key={v} onClick={()=>setSessionTab(v)} style={{padding:"7px 14px",borderRadius:7,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",background:sessionTab===v?"#1e293b":"transparent",color:sessionTab===v?"#f8fafc":"#475569",transition:"all .18s"}}>{l}</button>
              ))}
            </div>

            {/* ── PRE-RUN TAB ── */}
            {sessionTab==="pre-run"&&preData&&!carbLoad&&(
              <div style={{background:"#0c1420",border:"1px solid #1e293b",borderTop:`2px solid ${sess?.color}`,animation:"fi .3s ease"}}>
                {/* Goal banner */}
                <div style={{padding:"16px 20px 0"}}>
                  <div style={{background:`${sess?.color}08`,border:`1px solid ${sess?.color}25`,borderRadius:10,padding:"12px 16px",marginBottom:14}}>
                    <div style={{fontSize:10,fontFamily:mono,color:sess?.color,letterSpacing:"0.12em",marginBottom:5}}>⚡ PRE-RUN FUELLING · {preData.window.toUpperCase()}</div>
                    <p style={{fontSize:13,color:"#94a3b8",lineHeight:1.6}}><strong style={{color:"#e2e8f0"}}>Goal:</strong> {preData.goal}</p>
                  </div>
                </div>
                {/* Meal tabs */}
                <div style={{padding:"0 14px",overflowX:"auto"}}>
                  <div style={{display:"flex",gap:5,minWidth:"max-content",marginBottom:0}}>
                    {preData.meals.map((m,i)=>(
                      <button key={i} onClick={()=>setPreMeal(i)} style={{padding:"6px 12px",borderRadius:6,fontSize:12,fontWeight:500,border:"1px solid",borderColor:preMeal===i?"#334155":"#1e293b",background:preMeal===i?"#1e293b":"transparent",color:preMeal===i?"#e2e8f0":"#64748b",cursor:"pointer",whiteSpace:"nowrap",transition:"all .18s"}}>{m.emoji} {m.name}</button>
                    ))}
                  </div>
                </div>
                <div key={`pre-${selected}-${preMeal}`} style={{padding:"18px 20px",animation:"fi .3s ease"}}>
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap",marginBottom:12}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                        <span style={{fontSize:28}}>{preData.meals[preMeal].emoji}</span>
                        <div>
                          <div style={{fontSize:16,fontWeight:700,color:"#f8fafc"}}>{preData.meals[preMeal].name}</div>
                          <div style={{fontSize:10,fontFamily:mono,color:sess?.color}}>⏰ {preData.meals[preMeal].timing}</div>
                        </div>
                      </div>
                      <p style={{fontSize:13,color:"#64748b",lineHeight:1.6,maxWidth:460}}>{preData.meals[preMeal].why}</p>
                    </div>
                    {preData.meals[preMeal].kcal>0&&(
                      <div style={{display:"flex",gap:6,flexShrink:0}}>
                        {showKcal&&<div style={{background:"#080f1a",border:"1px solid #1e293b",borderRadius:7,padding:"6px 12px",textAlign:"center"}}>
                          <div style={{fontSize:9,fontFamily:mono,color:"#475569",marginBottom:2}}>kcal</div>
                          <div style={{fontSize:18,fontWeight:700,color:sess?.color,fontFamily:mono}}>{kg?Math.round(preData.meals[preMeal].kcal*Math.max(.8,Math.min(1.4,kg/70))):preData.meals[preMeal].kcal}</div>
                        </div>}

                              <a href={m.recipe} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,color:"#60a5fa",textDecoration:"none",fontFamily:mono,border:"1px solid #1e3a5f",padding:"5px 12px",borderRadius:6,background:"#0a1929"}}>📖 View Full Recipe ↗</a>
                            </div>
                          </div>
                          <div style={{borderTop:"1px solid #0f172a",paddingTop:14}}>
                            <div style={{fontSize:10,fontFamily:mono,color:"#334155",letterSpacing:"0.1em",marginBottom:10}}>
                              INGREDIENTS {kg?`— SCALED TO ${kg.toFixed(0)}KG`:"— ENTER WEIGHT TO PERSONALISE"}
                            </div>
                            <div style={{display:"flex",flexDirection:"column",gap:5}}>
                              {ings.map((ing,i)=>(
                                <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 12px",background:"#080f1a",borderRadius:8,border:"1px solid #0f172a"}}>
                                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                                    <span style={{color:"#60a5fa",fontSize:10}}>◆</span>
                                    <span style={{fontSize:13,color:"#cbd5e1"}}>{ing.displayLabel}</span>
                                  </div>
                                  {ing.kcal>0&&(
                                    <div style={{display:"flex",gap:8,flexShrink:0}}>
                                      {showKcal&&<span style={{fontSize:11,fontFamily:mono,color:"#475569"}}>{ing.kcal} kcal</span>}
                                      {showKj&&<span style={{fontSize:11,fontFamily:mono,color:"#334155"}}>{Math.round(ing.kcal*4.184)} kJ</span>}
                                    </div>
                                  )}
                                </div>
                              ))}
                            </div>
                            {total>0&&(
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:"#0a1929",borderRadius:8,marginTop:6,border:"1px solid #1e3a5f"}}>
                                <span style={{fontSize:12,fontWeight:700,color:"#e2e8f0"}}>Total</span>
                                <div style={{display:"flex",gap:12}}>
                                  {showKcal&&<span style={{fontSize:13,fontWeight:700,fontFamily:mono,color:"#60a5fa"}}>{total.toLocaleString()} kcal</span>}
                                  {showKj&&<span style={{fontSize:13,fontWeight:700,fontFamily:mono,color:"#a78bfa"}}>{Math.round(total*4.184).toLocaleString()} kJ</span>}
                                </div>
                              </div>
                            )}
                          </div>
                          {/* Protocol tips */}
                          <div style={{marginTop:16,background:"#0a1929",border:"1px solid #1e3a5f",borderRadius:12,padding:18}}>
                            <div style={{fontSize:11,fontFamily:mono,color:"#60a5fa",letterSpacing:"0.1em",marginBottom:12}}>📋 CARB LOADING PROTOCOL</div>
                            {["Start 2–3 days before race day — not just the night before.","Eat every 2–3 hours. Spread carbs across 5–6 meals, don't binge in one sitting.","Choose low-fibre carbs: white rice, white bread, pasta, bagels, bananas.","Cut back on fat and protein temporarily to make calorie room for carbs.","Avoid new foods or restaurants — race week is not the time to experiment.","You may feel heavier — each gram of glycogen holds ~3g of water. This is completely normal.","Taper your training alongside the carb load — you are storing energy, not burning it."].map((tip,i)=>(
                              <div key={i} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
                                <div style={{width:20,height:20,borderRadius:"50%",background:"#1e3a5f",border:"1px solid #60a5fa55",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:mono,fontSize:9,color:"#60a5fa",flexShrink:0}}>{i+1}</div>
                                <span style={{fontSize:13,color:"#94a3b8",lineHeight:1.6}}>{tip}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

                {!selected&&!carbLoad&&(
          <div style={{textAlign:"center",padding:"50px 20px",color:"#1e293b",fontFamily:mono,fontSize:13,letterSpacing:"0.08em"}}>
            ↑ SELECT A SESSION OR ENABLE CARB LOADING TO BEGIN
          </div>
        )}
      </div>
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
